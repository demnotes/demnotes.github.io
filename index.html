<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DemNotes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
:root{--bg:#0a0a0a;--sidebar-bg:#111111;--card-hover:#1a1a1a;--border:#2a2a2a;--text-primary:#e8e8e8;--text-secondary:#888888;--accent:#7c5cfc;--accent-hover:#9b7ffe;--accent-dim:rgba(124,92,252,0.12);--overlay:rgba(0,0,0,0.6);--code-bg:#161616;--callout-bg:rgba(124,92,252,0.08);--highlight:rgba(255,230,0,0.25);--danger:#e5484d;--success:#30a46c;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);--topbar-h:52px;--bottombar-h:62px;--font-body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;--font-heading:'Playfair Display',Georgia,serif;--font-mono:'JetBrains Mono',monospace;--radius:10px;--radius-sm:6px;--transition:250ms ease}
[data-theme="light"]{--bg:#ffffff;--sidebar-bg:#f7f7f5;--card-hover:#f0f0ee;--border:#e0e0e0;--text-primary:#1a1a1a;--text-secondary:#666;--accent:#6b4fcc;--accent-hover:#7c5cfc;--accent-dim:rgba(107,79,204,0.1);--overlay:rgba(0,0,0,0.35);--code-bg:#f4f4f4;--callout-bg:rgba(107,79,204,0.07);--highlight:rgba(255,230,0,0.35)}
[data-theme="dark-blue"]{--bg:#080e1c;--sidebar-bg:#0c1428;--card-hover:#121c34;--border:#1a2844;--text-primary:#d0ddf0;--text-secondary:#6880a4;--accent:#3b82f6;--accent-hover:#60a5fa;--accent-dim:rgba(59,130,246,0.12);--overlay:rgba(0,0,0,0.65);--code-bg:#0a1020;--callout-bg:rgba(59,130,246,0.08);--highlight:rgba(59,130,246,0.2)}
[data-theme="light-blue"]{--bg:#f0f5ff;--sidebar-bg:#e0eafc;--card-hover:#d0dff5;--border:#b0c8e8;--text-primary:#0f1d2e;--text-secondary:#4a6585;--accent:#2563eb;--accent-hover:#3b82f6;--accent-dim:rgba(37,99,235,0.1);--overlay:rgba(0,0,0,0.3);--code-bg:#dce6f8;--callout-bg:rgba(37,99,235,0.06);--highlight:rgba(37,99,235,0.14)}
[data-theme="dark-pink"]{--bg:#14080e;--sidebar-bg:#1c0c16;--card-hover:#28121e;--border:#3e1a2e;--text-primary:#f0d0e0;--text-secondary:#a06888;--accent:#ec4899;--accent-hover:#f472b6;--accent-dim:rgba(236,72,153,0.12);--overlay:rgba(0,0,0,0.65);--code-bg:#160810;--callout-bg:rgba(236,72,153,0.08);--highlight:rgba(236,72,153,0.2)}
[data-theme="light-pink"]{--bg:#fff0f5;--sidebar-bg:#fce4ee;--card-hover:#f8d0e0;--border:#e8a8c0;--text-primary:#2e0f1c;--text-secondary:#88506a;--accent:#db2777;--accent-hover:#ec4899;--accent-dim:rgba(219,39,119,0.1);--overlay:rgba(0,0,0,0.3);--code-bg:#fce0ec;--callout-bg:rgba(219,39,119,0.06);--highlight:rgba(219,39,119,0.14)}
[data-theme="dark-orange"]{--bg:#140e08;--sidebar-bg:#1c140a;--card-hover:#281c10;--border:#3e2a16;--text-primary:#f0e0cc;--text-secondary:#a08860;--accent:#ea580c;--accent-hover:#f97316;--accent-dim:rgba(234,88,12,0.12);--overlay:rgba(0,0,0,0.65);--code-bg:#160e06;--callout-bg:rgba(234,88,12,0.08);--highlight:rgba(234,88,12,0.2)}
[data-theme="light-orange"]{--bg:#fff8f0;--sidebar-bg:#fceee0;--card-hover:#f8e0cc;--border:#e8c8a0;--text-primary:#2e1c0f;--text-secondary:#886840;--accent:#ea580c;--accent-hover:#f97316;--accent-dim:rgba(234,88,12,0.1);--overlay:rgba(0,0,0,0.3);--code-bg:#fcf0e4;--callout-bg:rgba(234,88,12,0.06);--highlight:rgba(234,88,12,0.14)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font-body);font-size:15px;line-height:1.6;color:var(--text-primary);background:var(--bg);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;transition:background var(--transition),color var(--transition)}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-track{background:transparent}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea{font-family:inherit;font-size:inherit;color:inherit}
.onboarding{position:fixed;inset:0;z-index:9999;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px;text-align:center;color:#e8e8e8}
.onboarding.hidden{display:none}
.ob-logo{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#7c5cfc,#b794f6);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;color:#fff;margin-bottom:8px}
.ob-title{font-family:var(--font-heading);font-size:28px;font-weight:700}
.ob-sub{color:#888;font-size:14px;margin-bottom:12px}
.ob-langs{display:flex;flex-direction:column;gap:10px;width:100%;max-width:260px}
.ob-lang{padding:16px 20px;border-radius:10px;background:#1a1a1a;border:2px solid #2a2a2a;font-size:16px;font-weight:500;display:flex;align-items:center;gap:14px;transition:all 150ms;color:#e8e8e8}
.ob-lang:active{border-color:#7c5cfc;background:rgba(124,92,252,0.12)}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:calc(var(--topbar-h)+var(--safe-top));padding-top:var(--safe-top);display:flex;align-items:center;justify-content:space-between;padding-left:max(10px,var(--safe-left));padding-right:max(10px,var(--safe-right));background:var(--bg);border-bottom:1px solid var(--border);transition:background var(--transition),border-color var(--transition);gap:4px}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:2px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;text-align:center}
.topbar-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;margin:0 auto;background:none;border:none;color:var(--text-primary);text-align:center;outline:none;padding:4px 8px;border-radius:var(--radius-sm);transition:background var(--transition)}
.topbar-title:focus{background:var(--card-hover)}
.icon-btn{width:38px;height:38px;min-width:38px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);transition:background 150ms;font-size:18px}
.icon-btn:active{background:var(--card-hover)}
.icon-btn svg{width:20px;height:20px;stroke:var(--text-primary);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.lang-btn{font-size:11px;font-weight:600;padding:4px 7px;border-radius:var(--radius-sm);background:var(--card-hover);color:var(--text-secondary);letter-spacing:.5px;min-width:32px;text-align:center}
.lang-btn:active{background:var(--accent-dim);color:var(--accent)}
.saved-indicator{position:fixed;top:calc(var(--topbar-h)+var(--safe-top)+6px);left:50%;transform:translateX(-50%);font-size:11px;color:var(--success);font-weight:500;opacity:0;transition:opacity 200ms;z-index:101;pointer-events:none;background:var(--bg);padding:2px 10px;border-radius:12px;border:1px solid var(--border)}
.saved-indicator.show{opacity:1}
.sidebar-overlay{position:fixed;inset:0;z-index:200;background:var(--overlay);opacity:0;visibility:hidden;transition:opacity var(--transition),visibility var(--transition)}
.sidebar-overlay.open{opacity:1;visibility:visible}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;max-width:80vw;z-index:201;background:var(--sidebar-bg);transform:translateX(-100%);transition:transform var(--transition),background var(--transition);display:flex;flex-direction:column;padding-top:var(--safe-top);overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sidebar-header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#b794f6);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.sidebar-brand{font-size:17px;font-weight:600;letter-spacing:-.3px}
.sidebar-actions{display:flex;gap:6px;margin:10px 14px}
.sidebar-act-btn{flex:1;padding:9px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);font-weight:500;font-size:13px;display:flex;align-items:center;justify-content:center;gap:5px;transition:background 150ms}
.sidebar-act-btn.secondary{background:var(--card-hover);color:var(--text-primary);border:1px solid var(--border)}
.sidebar-act-btn:active{opacity:.8}
.sidebar-section-label{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px;padding:10px 16px 4px}
.sidebar-pages{flex:1;overflow-y:auto;padding-bottom:10px}
.sidebar-page-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background 120ms;position:relative}
.sidebar-page-item:active,.sidebar-page-item.active{background:var(--card-hover)}
.sidebar-page-icon{font-size:17px;flex-shrink:0;width:22px;text-align:center}
.sidebar-page-title{flex:1;font-size:13px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-page-del{font-size:14px;color:var(--danger);flex-shrink:0;padding:4px 6px;border-radius:4px;opacity:.7}
.sidebar-page-del:active{opacity:1;background:rgba(229,72,77,.15)}
.sidebar-page-star{font-size:13px;color:var(--text-secondary);flex-shrink:0;opacity:.5;padding:4px}
.sidebar-page-star.fav{color:#f5a623;opacity:1}
.sidebar-folder-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background 120ms}
.sidebar-folder-item:active{background:var(--card-hover)}
.sidebar-folder-title{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-folder-arrow{color:var(--text-secondary);font-size:11px;transition:transform 200ms}
.sidebar-folder-arrow.open{transform:rotate(90deg)}
.sidebar-folder-children{padding-left:18px;display:none}
.sidebar-folder-children.open{display:block}
.sidebar-footer{padding:10px 16px;border-top:1px solid var(--border);flex-shrink:0}
.main{flex:1;margin-top:calc(var(--topbar-h)+var(--safe-top));margin-bottom:calc(var(--bottombar-h)+var(--safe-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch}
.page-cover{height:60px;width:100%;cursor:pointer;position:relative;transition:background 300ms}
.page-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--bg))}
.page-header{padding:0 20px 6px;position:relative;margin-top:-20px}
.page-icon-btn{font-size:34px;cursor:pointer;padding:0;position:relative;z-index:2;line-height:1}
.page-title-input{display:block;width:100%;font-family:var(--font-heading);font-size:26px;font-weight:700;background:none;border:none;color:var(--text-primary);outline:none;padding:6px 0 2px;line-height:1.3}
.page-title-input::placeholder{color:var(--text-secondary)}
.page-meta{font-size:12px;color:var(--text-secondary);padding:0 0 8px}
.page-add-block-bar{display:flex;align-items:center;gap:8px;padding:4px 16px 8px}
.page-add-block-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius-sm);background:var(--card-hover);border:1px solid var(--border);font-size:13px;color:var(--text-secondary);transition:all 120ms}
.page-add-block-btn:active{border-color:var(--accent);color:var(--accent)}
.blocks-container{padding:0 16px 20px}
.block-wrapper{position:relative;padding:2px 0;margin:1px 0;animation:blockIn 150ms ease}
@keyframes blockIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.block-content{outline:none;min-height:1.6em;padding:3px 4px;border-radius:3px;transition:background 120ms;word-wrap:break-word;overflow-wrap:break-word}
.block-content:empty::before{content:attr(data-placeholder);color:var(--text-secondary);pointer-events:none}
.block-content.h1{font-family:var(--font-heading);font-size:26px;font-weight:700;line-height:1.3;padding:6px 4px 2px}
.block-content.h2{font-size:20px;font-weight:600;padding:5px 4px 2px}
.block-content.h3{font-size:16px;font-weight:600;padding:4px 4px 2px}
.block-todo{display:flex;align-items:flex-start;gap:8px}
.todo-check{width:20px;height:20px;min-width:20px;margin-top:4px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 150ms;font-size:13px}
.todo-check.checked{background:var(--accent);border-color:var(--accent);color:#fff}
.block-content.done{text-decoration:line-through;color:var(--text-secondary)}
.block-bullet{display:flex;align-items:flex-start;gap:8px}
.block-bullet::before{content:'•';color:var(--text-secondary);font-size:20px;line-height:1.6;flex-shrink:0;width:12px;text-align:center}
.block-numbered{display:flex;align-items:flex-start;gap:8px}
.block-num-label{color:var(--text-secondary);font-size:14px;font-weight:500;line-height:1.6;flex-shrink:0;min-width:20px}
.block-code-wrap{background:var(--code-bg);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden}
.block-code-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;font-size:11px;color:var(--text-secondary);border-bottom:1px solid var(--border)}
.block-code-copy{font-size:11px;color:var(--accent);padding:2px 8px;border-radius:4px}
.block-content.code{font-family:var(--font-mono);font-size:13px;line-height:1.5;padding:10px 12px;white-space:pre-wrap;tab-size:2}
.block-quote-wrap{border-left:3px solid var(--accent);padding-left:14px}
.block-content.quote{font-style:italic;color:var(--text-secondary)}
.block-callout{display:flex;gap:10px;align-items:flex-start;background:var(--callout-bg);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--border)}
.callout-emoji{font-size:20px;flex-shrink:0;cursor:pointer}
.block-divider{height:1px;background:var(--border);margin:12px 0}
.block-image img{width:100%;border-radius:var(--radius-sm);display:block;cursor:pointer}
.block-image .image-caption{font-size:13px;color:var(--text-secondary);text-align:center;padding:6px 4px;outline:none;min-height:1.4em}
.block-image .image-caption:empty::before{content:attr(data-placeholder);color:var(--text-secondary);opacity:.5}
.block-image-actions{display:flex;gap:8px;padding:8px 0}
.block-image-actions button{padding:8px 16px;border-radius:var(--radius-sm);background:var(--card-hover);font-size:13px;font-weight:500;border:1px solid var(--border)}
.block-pdf-wrap{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.block-pdf-header{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card-hover);font-size:13px;font-weight:500}
.block-pdf-header svg{width:18px;height:18px;stroke:var(--danger);fill:none;stroke-width:1.8}
.block-pdf-open{margin-left:auto;color:var(--accent);font-size:12px}
.block-pdf-wrap iframe{width:100%;height:400px;border:none}
.block-drawing img{width:100%;border-radius:var(--radius-sm);display:block;cursor:pointer;border:1px solid var(--border)}
.drawing-overlay{position:fixed;inset:0;z-index:300;background:var(--bg);display:none;flex-direction:column}
.drawing-overlay.open{display:flex}
.drawing-toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;padding-top:calc(8px+var(--safe-top));background:var(--sidebar-bg);border-bottom:1px solid var(--border);flex-wrap:wrap}
.draw-tool-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid transparent;transition:all 120ms}
.draw-tool-btn.active{border-color:var(--accent);background:var(--accent-dim)}
.draw-color{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color 120ms}
.draw-color.active{border-color:var(--text-primary)}
.draw-size-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid transparent}
.draw-size-btn.active{border-color:var(--accent)}
.drawing-canvas-area{flex:1;display:flex;overflow:hidden;background:#fff}
.drawing-canvas-area canvas{touch-action:none;width:100%;height:100%}
.drawing-bottom-bar{display:flex;gap:10px;padding:10px 16px;padding-bottom:calc(10px+var(--safe-bottom));background:var(--sidebar-bg);border-top:1px solid var(--border);justify-content:flex-end}
.draw-action-btn{padding:8px 20px;border-radius:var(--radius-sm);font-weight:500;font-size:14px}
.draw-action-btn.primary{background:var(--accent);color:#fff}
.draw-action-btn.secondary{background:var(--card-hover);border:1px solid var(--border)}
.draw-action-btn.danger{color:var(--danger)}
.bottombar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:calc(var(--bottombar-h)+var(--safe-bottom));padding-bottom:var(--safe-bottom);display:flex;align-items:center;justify-content:space-around;background:var(--bg);border-top:1px solid var(--border);transition:background var(--transition),border-color var(--transition)}
.bottombar-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 6px;border-radius:8px;min-width:44px;transition:color 120ms;color:var(--text-secondary)}
.bottombar-item.active{color:var(--accent)}
.bottombar-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bottombar-label{font-size:9px;font-weight:500}
.bottombar-add{width:42px;height:42px;border-radius:12px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:300;transition:transform 120ms,background 120ms}
.bottombar-add:active{transform:scale(.9);background:var(--accent-hover)}
.cmd-overlay{position:fixed;inset:0;z-index:250;background:var(--overlay);opacity:0;visibility:hidden;transition:opacity 300ms,visibility 300ms}
.cmd-overlay.open{opacity:1;visibility:visible}
.cmd-sheet{position:fixed;bottom:0;left:0;right:0;z-index:251;max-height:55vh;background:var(--sidebar-bg);border-radius:16px 16px 0 0;padding-bottom:var(--safe-bottom);transform:translateY(100%);transition:transform 300ms ease,background var(--transition);display:flex;flex-direction:column}
.cmd-sheet.open{transform:translateY(0)}
.cmd-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 6px}
.cmd-search{margin:4px 16px 8px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:14px;outline:none}
.cmd-search::placeholder{color:var(--text-secondary)}
.cmd-list{overflow-y:auto;padding:0 8px 12px}
.cmd-section-label{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px;padding:8px 12px 4px}
.cmd-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background 100ms}
.cmd-item:active{background:var(--card-hover)}
.cmd-item-icon{width:34px;height:34px;border-radius:8px;background:var(--card-hover);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cmd-item-text{flex:1}.cmd-item-title{font-size:14px;font-weight:500}.cmd-item-desc{font-size:11px;color:var(--text-secondary)}
.fmt-toolbar{position:fixed;left:0;right:0;z-index:150;background:var(--sidebar-bg);border-top:1px solid var(--border);display:none;overflow-x:auto;padding:6px 8px;gap:2px;white-space:nowrap;transition:background var(--transition)}
.fmt-toolbar.show{display:flex}
.fmt-btn{min-width:36px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);font-size:14px;font-weight:600;color:var(--text-primary);transition:background 100ms;flex-shrink:0;padding:0 6px}
.fmt-btn:active{background:var(--accent-dim);color:var(--accent)}
.fmt-color-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border)}
.search-view,.howto-view,.settings-view{position:fixed;inset:0;z-index:180;background:var(--bg);display:none;flex-direction:column;padding-top:var(--safe-top);transition:background var(--transition)}
.search-view.open,.howto-view.open,.settings-view.open{display:flex}
.search-header,.howto-header,.settings-header{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);font-size:17px;font-weight:600}
.settings-back{font-size:20px;padding:4px}
.search-input{flex:1;padding:10px 14px;background:var(--card-hover);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:15px;outline:none}
.search-input::placeholder{color:var(--text-secondary)}
.search-cancel{color:var(--accent);font-weight:500;font-size:14px;padding:8px}
.search-results,.howto-content,.settings-content{flex:1;overflow-y:auto;padding:12px 16px}
.search-result-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:var(--radius-sm);cursor:pointer;transition:background 100ms}
.search-result-item:active{background:var(--card-hover)}
.search-result-icon{font-size:20px;flex-shrink:0}
.search-result-title{font-size:14px;font-weight:500}
.search-result-snippet{font-size:12px;color:var(--text-secondary);margin-top:2px;line-height:1.4}
.search-empty{text-align:center;padding:40px 20px;color:var(--text-secondary);font-size:14px}
.howto-section{margin-bottom:18px}
.howto-section h3{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--accent)}
.howto-section p{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:6px}
.howto-tip{display:flex;gap:10px;padding:10px 12px;background:var(--card-hover);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:6px;font-size:13px;line-height:1.5;align-items:center}
.howto-tip-icon{font-size:16px;flex-shrink:0}
.settings-group{margin-bottom:18px}
.settings-group-label{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:10px}
.settings-item-label{font-size:14px}
.settings-lang-options{display:flex;gap:5px}
.settings-lang-opt{padding:5px 12px;border-radius:var(--radius-sm);background:var(--card-hover);border:1px solid var(--border);font-size:12px;font-weight:500;transition:all 120ms}
.settings-lang-opt.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.theme-opt{padding:8px 4px;border-radius:var(--radius-sm);border:2px solid var(--border);text-align:center;font-size:10px;font-weight:500;cursor:pointer;transition:all 120ms;line-height:1.3}
.theme-opt.active{border-color:var(--accent)}
.theme-opt-dot{width:20px;height:20px;border-radius:50%;margin:0 auto 4px;border:1px solid rgba(128,128,128,.3)}
.settings-btn{width:100%;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;text-align:center;background:var(--card-hover);border:1px solid var(--border);margin-bottom:8px;transition:background 120ms}
.settings-btn:active{background:var(--accent-dim)}
.settings-btn.danger{color:var(--danger);border-color:var(--danger)}
.settings-about{text-align:center;padding:16px;font-size:13px;color:var(--text-secondary);line-height:1.6}
.emoji-picker{position:fixed;z-index:260;background:var(--sidebar-bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px;box-shadow:0 8px 32px rgba(0,0,0,.3);display:none;max-width:280px}
.emoji-picker.open{display:block}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.emoji-cell{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:6px;cursor:pointer}
.emoji-cell:active{background:var(--card-hover)}
.cover-picker{position:absolute;top:60px;left:16px;right:16px;z-index:120;background:var(--sidebar-bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;box-shadow:0 8px 32px rgba(0,0,0,.3);display:none}
.cover-picker.open{display:block}
.cover-options{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cover-opt{height:40px;border-radius:var(--radius-sm);cursor:pointer;border:2px solid transparent;transition:border-color 120ms}
.cover-opt.active{border-color:var(--accent)}
.ctx-menu,.page-ctx-menu{position:fixed;z-index:260;background:var(--sidebar-bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px;box-shadow:0 8px 32px rgba(0,0,0,.3);min-width:170px;display:none}
.ctx-menu.open,.page-ctx-menu.open{display:block}
.ctx-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;transition:background 100ms}
.ctx-item:active{background:var(--card-hover)}
.ctx-item.danger{color:var(--danger)}
.ctx-item-icon{width:20px;text-align:center;font-size:15px}
.dialog-overlay{position:fixed;inset:0;z-index:500;background:var(--overlay);display:none;align-items:center;justify-content:center;padding:20px}
.dialog-overlay.open{display:flex}
.dialog-box{background:var(--sidebar-bg);border-radius:var(--radius);padding:24px;max-width:320px;width:100%;border:1px solid var(--border)}
.dialog-title{font-size:17px;font-weight:600;margin-bottom:8px}
.dialog-msg{font-size:14px;color:var(--text-secondary);margin-bottom:16px;line-height:1.5}
.dialog-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.dialog-btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500}
.dialog-btn.primary{background:var(--accent);color:#fff}
.dialog-btn.secondary{background:var(--card-hover);border:1px solid var(--border)}
.dialog-btn.danger{background:var(--danger);color:#fff}
.dialog-input{width:100%;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text-primary);margin-bottom:12px;outline:none;font-size:14px}
mark{background:var(--highlight);padding:1px 2px;border-radius:2px}
.block-content a{color:var(--accent);text-decoration:underline}
code:not(.block-content){font-family:var(--font-mono);font-size:.9em;background:var(--code-bg);padding:2px 5px;border-radius:3px;border:1px solid var(--border)}

function renderBlock(b,idx,nc){const ph=b.type==='paragraph'?`'/' ${t('cmdPlaceholder')}`:b.type.startsWith('h')?t(b.type):'';switch(b.type){case'paragraph':case'h1':case'h2':case'h3':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-content ${b.type}" contenteditable="true" data-placeholder="${ph}" data-block-id="${b.id}">${b.content}</div></div>`;case'todo':const ck=b.metadata?.checked;return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-todo"><div class="todo-check${ck?' checked':''}" data-block-id="${b.id}">${ck?'✓':''}</div><div class="block-content${ck?' done':''}" contenteditable="true" data-placeholder="${t('todo')}" data-block-id="${b.id}">${b.content}</div></div></div>`;case'bullet':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-bullet"><div class="block-content" contenteditable="true" data-placeholder="${t('bullet')}" data-block-id="${b.id}">${b.content}</div></div></div>`;case'numbered':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-numbered"><span class="block-num-label">${nc}.</span><div class="block-content" contenteditable="true" data-placeholder="${t('numbered')}" data-block-id="${b.id}">${b.content}</div></div></div>`;case'code':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-code-wrap"><div class="block-code-header"><span>Code</span><button class="block-code-copy" data-block-id="${b.id}">${t('copy')}</button></div><div class="block-content code" contenteditable="true" data-placeholder="${t('code')}" data-block-id="${b.id}">${b.content}</div></div></div>`;case'quote':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-quote-wrap"><div class="block-content quote" contenteditable="true" data-placeholder="${t('quote')}" data-block-id="${b.id}">${b.content}</div></div></div>`;case'callout':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-callout"><span class="callout-em function showFormatToolbar(){const tb=$('#fmtToolbar');tb.innerHTML=`<button class="fmt-btn" data-cmd="bold"><b>B</b></button><button class="fmt-btn" data-cmd="italic"><i>I</i></button><button class="fmt-btn" data-cmd="underline"><u>U</u></button><button class="fmt-btn" data-cmd="strikeThrough"><s>S</s></button><button class="fmt-btn" data-cmd="highlight">🖍️</button>${TEXT_COLORS.map(c=>`<button class="fmt-btn" data-cmd="color" data-color="${c}"><span class="fmt-color-dot" style="background:${c}"></span></button>`).join('')}<button class="fmt-btn" data-cmd="removeFormat">✕</button>`;tb.classList.add('show');if(window.visualViewport){const v=window.visualViewport;tb.style.bottom=(innerHeight-v.height-v.offsetTop)+'px'}else tb.style.bottom='0px';tb.querySelectorAll('.fmt-btn').forEach(btn=>{btn.onmousedown=e=>{e.preventDefault();const cmd=btn.getAttribute('data-cmd');if(cmd==='highlight')document.execCommand('hiliteColor',false,'yellow');else if(cmd==='color')document.execCommand('foreColor',false,btn.getAttribute('data-color'));else document.execCommand(cmd,false,null)}})}
document.addEventListener('selectionchange',()=>{const s=window.getSelection();if(s&&s.toString().length>0&&s.anchorNode){const p=s.anchorNode.parentElement;if(p&&p.closest('.block-content[contenteditable]')){showFormatToolbar();return}}$('#fmtToolbar').classList.remove('show')});
function uploadImage(bid){const i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=()=>{const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const p=getCurrentPage();const b=p.blocks.find(bl=>bl.id===bid);if(b){b.content=r.result;p.updatedAt=Date.now();renderPage();saveData()}};r.readAsDataURL(f)};i.click()}
function uploadPDF(bid){const i=document.createElement('input');i.type='file';i.accept='.pdf';i.onchange=()=>{const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const p=getCurrentPage();const b=p.blocks.find(bl=>bl.id===bid);if(b){b.content=r.result;b.metadata={filename:f.name};p.updatedAt=Date.now();renderPage();saveData()}};r.readAsDataURL(f)};i.click()}
function openDrawingCanvas(bid){drawingBlockId=bid;$('#drawingOverlay').classList.add('open');const canvas=$('#drawCanvas');const area=canvas.parentElement;canvas.width=area.clientWidth;canvas.height=area.clientHeight;drawingCtx=canvas.getContext('2d');drawingCtx.lineCap='round';drawingCtx.lineJoin='round';const page=getCurrentPage();const block=page?.blocks.find(b=>b.id===bid);if(block?.content){const img=new Image();img.onload=()=>drawingCtx.drawImage(img,0,0,canvas.width,canvas.height);img.src=block.content}else{drawingCtx.fillStyle='#ffffff';drawingCtx.fillRect(0,0,canvas.width,canvas.height)}drawMode='pen';drawColor='#1a1a1a';drawSize=3;renderDrawToolbar();canvas.ontouchstart=e=>{e.preventDefault();startDraw(e.touches[0].clientX,e.touches[0].clientY,canvas)};canvas.ontouchmove=e=>{e.preventDefault();moveDraw(e.touches[0].clientX,e.touches[0].clientY,canvas)};canvas.ontouchend=()=>{isDrawing=false;drawPoints=[]};canvas.onmousedown=e=>startDraw(e.clientX,e.clientY,canvas);canvas.onmousemove=e=>{if(isDrawing)moveDraw(e.clientX,e.clientY,canvas)};canvas.onmouseup=canvas.onmouseleave=()=>{isDrawing=false;drawPoints=[]}}
function renderDrawToolbar(){$('#drawingToolbar').innerHTML=`<button class="draw-tool-btn${drawMode==='pen'?' active':''}" data-mode="pen">✏️</button><button class="draw-tool-btn${drawMode==='eraser'?' active':''}" data-mode="eraser">🧹</button><span style="width:1px;height:22px;background:var(--border);margin:0 3px"></span>${DRAW_COLORS.map(c=>`<div class="draw-color${drawColor===c?' active':''}" style="background:${c}" data-color="${c}"></div>`).join('')}<span style="width:1px;height:22px;background:var(--border);margin:0 3px"></span>${[2,5,10].map(s=>`<button class="draw-size-btn${drawSize===s?' active':''}" data-size="${s}"><span style="width:${s+4}px;height:${s+4}px;border-radius:50%;background:var(--text-primary);display:block"></span></button>`).join('')}`;$('#drawingToolbar').querySelectorAll('.draw-tool-btn').forEach(el=>{el.onclick=()=>{drawMode=el.getAttribute('data-mode');renderDrawToolbar()}});$('#drawingToolbar').querySelectorAll('.draw-color').forEach(el=>{el.onclick=()=>{drawColor=el.getAttribute('data-color');drawMode='pen';renderDrawToolbar()}});$('#drawingToolbar').querySelectorAll('.draw-size-btn').forEach(el=>{el.onclick=()=>{drawSize=parseInt(el.getAttribute('data-size'));renderDrawToolbar()}});$('#drawingBottomBar').innerHTML=`<button class="draw-action-btn danger" id="drawClear">${t('clear')}</button><button class="draw-action-btn secondary" id="drawCancel">${t('cancel')}</button><button class="draw-action-btn primary" id="drawDone">${t('done')}</button>`;$('#drawClear').onclick=()=>{drawingCtx.fillStyle='#ffffff';drawingCtx.fillRect(0,0,$('#drawCanvas').width,$('#drawCanvas').height)};$('#drawCancel').onclick=()=>$('#drawingOverlay').classList.remove('open');$('#drawDone').onclick=()=>{const d=$('#drawCanvas').toDataURL('image/png');const p=getCurrentPage();const b=p?.blocks.find(bl=>bl.id===drawingBlockId);if(b){b.content=d;p.updatedAt=Date.now();renderPage();saveData()}$('#drawingOverlay').classList.remove('open')}}
function startDraw(cx,cy,canvas){isDrawing=true;const r=canvas.getBoundingClientRect();drawPoints=[{x:cx-r.left,y:cy-r.top}];drawingCtx.beginPath();drawingCtx.strokeStyle=drawMode==='eraser'?'#ffffff':drawColor;drawingCtx.lineWidth=drawMode==='eraser'?drawSize*4:drawSize;drawingCtx.moveTo(cx-r.left,cy-r.top)}
function moveDraw(cx,cy,canvas){if(!isDrawing)return;const r=canvas.getBoundingClientRect();const x=cx-r.left,y=cy-r.top;drawPoints.push({x,y});if(drawPoints.length>2){const l=drawPoints.length-1;const cp=drawPoints[l-1];const end={x:(cp.x+x)/2,y:(cp.y+y)/2};drawingCtx.quadraticCurveTo(cp.x,cp.y,end.x,end.y);drawingCtx.stroke();drawingCtx.beginPath();drawingCtx.moveTo(end.x,end.y)}else{drawingCtx.lineTo(x,y);drawingCtx.stroke()}}
function openBlockCtx(touch,idx){const page=getCurrentPage();if(!page)return;const menu=$('#ctxMenu');menu.innerHTML=`<div class="ctx-item" data-action="delete"><span class="ctx-item-icon">🗑️</span>${t('delete')}</div><div class="ctx-item" data-action="duplicate"><span class="ctx-item-icon">📋</span>${t('duplicate')}</div><div class="ctx-item" data-action="moveUp"><span class="ctx-item-icon">⬆️</span>${t('moveUp')}</div><div class="ctx-item" data-action="moveDown"><span class="ctx-item-icon">⬇️</span>${t('moveDown')}</div><div class="ctx-item" data-action="turnInto"><span class="ctx-item-icon">🔄</span>${t('turnInto')}</div>`;menu.style.left=Math.min(touch.clientX,innerWidth-200)+'px';menu.style.top=Math.min(touch.clientY,innerHeight-250)+'px';menu.classList.add('open');menu.querySelectorAll('.ctx-item').forEach(el=>{el.onclick=()=>{menu.classList.remove('open');const a=el.getAttribute('data-action');const b=page.blocks[idx];if(!b)return;if(a==='delete')deleteBlockAt(idx);if(a==='duplicate'){page.blocks.splice(idx+1,0,{...b,id:uid(),metadata:{...b.metadata}});page.updatedAt=Date.now();renderPage();saveData()}if(a==='moveUp'&&idx>0){[page.blocks[idx-1],page.blocks[idx]]=[page.blocks[idx],page.blocks[idx-1]];page.updatedAt=Date.now();renderPage();saveData()}if(a==='moveDown'&&idx<page.blocks.length-1){[page.blocks[idx],page.blocks[idx+1]]=[page.blocks[idx+1],page.blocks[idx]];page.updatedAt=Date.now();renderPage();saveData()}if(a==='turnInto')openCommandMenu(idx)}});setTimeout(()=>{const cl=e=>{if(!menu.contains(e.target)){menu.classList.remove('open');document.removeEventListener('click',cl)}};document.addEventListener('click',cl)},50)}
let emojiCb=null;function openEmojiPicker(e,cb){emojiCb=cb;const pk=$('#emojiPicker');$('#emojiGrid').innerHTML=EMOJIS.map(em=>`<div class="emoji-cell" data-emoji="${em}">${em}</div>`).join('');$('#emojiGrid').querySelectorAll('.emoji-cell').forEach(el=>{el.onclick=()=>{if(emojiCb)emojiCb(el.getAttribute('data-emoji'));pk.classList.remove('open')}});const rect=e.target?e.target.getBoundingClientRect():{left:100,bottom:100};pk.style.left=Math.min(rect.left,innerWidth-290)+'px';pk.style.top=Math.min(rect.bottom+4,innerHeight-200)+'px';pk.classList.add('open');setTimeout(()=>{const cl=ev=>{if(!pk.contains(ev.target)){pk.classList.remove('open');document.removeEventListener('click',cl)}};document.addEventListener('click',cl)},50)}
function openCoverPicker(){const page=getCurrentPage();if(!page)return;const pk=$('#coverPicker');$('#coverOptions').innerHTML=COVERS.map((g,i)=>`<div class="cover-opt${page.coverColor===g?' active':''}" style="background:${g}" data-idx="${i}"></div>`).join('');$('#coverOptions').querySelectorAll('.cover-opt').forEach(el=>{el.onclick=()=>{page.coverColor=COVERS[parseInt(el.getAttribute('data-idx'))];page.updatedAt=Date.now();renderPage();saveData();pk.classList.remove('open')}});pk.classList.add('open');setTimeout(()=>{const cl=ev=>{if(!pk.contains(ev.target)&&ev.target.id!=='pageCover'){pk.classList.remove('open');document.removeEventListener('click',cl)}};document.addEventListener('click',cl)},50)}
function openSearchView(){activeView='search';setBottomTab('search');$('#searchView').classList.add('open');$('#searchInput').value='';$('#searchResults').innerHTML='';setTimeout(()=>$('#searchInput').focus(),300)}
function closeSearchView(){$('#searchView').classList.remove('open')}
function performSearch(q){q=q.toLowerCase().trim();const res=$('#searchResults');if(!q){res.innerHTML='';return}let h='';state.pages.forEach(p=>{const tm=(p.title||'').toLowerCase().includes(q);let sn='';p.blocks.forEach(b=>{if(!sn){const d=document.createElement('div');d.innerHTML=b.content;const tx=d.textContent;if(tx.toLowerCase().includes(q)){const i=tx.toLowerCase().indexOf(q);sn=(i>30?'...':'')+tx.substring(Math.max(0,i-30),i+q.length+30)+(i+q.length+30<tx.length?'...':'')}}});if(tm||sn)h+=`<div class="search-result-item" data-page-id="${p.id}"><span class="search-result-icon">${p.icon||'📝'}</span><div><div class="search-result-title">${p.title||t('untitled')}</div>${sn?`<div class="search-result-snippet">${esc(sn)}</div>`:''}</div></div>`});if(!h)h=`<div class="search-empty">${t('noResults')}</div>`;res.innerHTML=h;res.querySelectorAll('.search-result-item').forEach(el=>{el.onclick=()=>{closeSearchView();openPage(el.getAttribute('data-page-id'))}})}
function openHowToView(){activeView='howto';setBottomTab('howto');$('#howtoView').classList.add('open');$('#howtoContent').innerHTML=`<div class="howto-section"><h3>📱 ${t('howtoTitle')}</h3></div><div class="howto-section"><h3>🧭 Bottom Navigation Bar</h3><p>${t('howtoNav')}</p><div class="howto-tip"><span class="howto-tip-icon">🏠</span><span>${t('howtoNavHome')}</span></div><div class="howto-tip"><span class="howto-tip-icon">🔍</span><span>${t('howtoNavSearch')}</span></div><div class="howto-tip"><span class="howto-tip-icon">➕</span><span>${t('howtoNavNew')}</span></div><div class="howto-tip"><span class="howto-tip-icon">ℹ️</span><span>${t('howtoNavHowTo')}</span></div><div class="howto-tip"><span class="howto-tip-icon">⚙️</span><span>${t('howtoNavSettings')}</span></div></div><div class="howto-section"><h3>🧱 ${t('addBlock')}</h3><p>${t('howtoBlocks')}</p><div class="howto-tip"><span class="howto-tip-icon">⌨️</span><span>${t('howtoSlash')}</span></div></div><div class="howto-section"><h3>✏️ ${t('bold')}, ${t('italic')}...</h3><p>${t('howtoFormat')}</p></div><div class="howto-section"><h3>📂 ${t('newFolder')}</h3><p>${t('howtoFolders')}</p></div><div class="howto-section"><h3>☰ Sidebar</h3><p>${t('howtoSidebar')}</p></div><div class="howto-section"><h3>🎨 ${t('drawing')}</h3><p>${t('howtoDrawing')}</p></div><div class="howto-section"><h3>🗑️ ${t('deleteNote')}</h3><p>${t('howtoDelete')}</p></div>`}
function closeHowToView(){$('#howtoView').classList.remove('open')}
function openSettingsView(){activeView='settings';setBottomTab('settings');$('#settingsView').classList.add('open');renderSettings()}
function closeSettingsView(){$('#settingsView').classList.remove('open')}
function renderSettings(){const c=$('#settingsContent');const lang=state.settings.language;const th=state.settings.theme;c.innerHTML=`<div class="settings-group"><div class="settings-group-label">${t('language')}</div><div class="settings-item"><span class="settings-item-label">${t('language')}</span><div class="settings-lang-options"><button class="settings-lang-opt${lang==='tr'?' active':''}" data-lang="tr">🇹🇷 TR</button><button class="settings-lang-opt${lang==='en'?' active':''}" data-lang="en">🇬🇧 EN</button><button class="settings-lang-opt${lang==='ru'?' active':''}" data-lang="ru">🇷🇺 RU</button></div></div></div><div class="settings-group"><div class="settings-group-label">${t('theme')}</div><div class="theme-grid">${THEMES.map(tm=>`<div class="theme-opt${th===tm.id?' active':''}" data-theme="${tm.id}"><div class="theme-opt-dot" style="background:${tm.dot}"></div>${t('theme'+tm.id.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join(''))}</div>`).join('')}</div></div><div class="settings-group"><div class="settings-group-label">${t('about')}</div><button class="settings-btn" id="sExport">${t('exportData')}</button><button class="settings-btn" id="sImport">${t('importData')}</button><button class="settings-btn danger" id="sClear">${t('clearData')}</button></div><div class="settings-about">DemNotes v2.0<br>Made with ❤️</div>`;c.querySelectorAll('.settings-lang-opt').forEach(el=>{el.onclick=()=>{state.settings.language=el.getAttribute('data-lang');applyLanguage();renderSettings();if(state.currentPageId)renderPage();renderSidebar();saveData()}});c.querySelectorAll('.theme-opt').forEach(el=>{el.onclick=()=>{state.settings.theme=el.getAttribute('data-theme');applyTheme();renderSettings();saveData()}});const exp=$('#sExport');if(exp)exp.onclick=()=>{const b=new Blob([JSON.stringify({pages:state.pages,folders:state.folders,settings:state.settings},null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='demnotes_backup.json';a.click();URL.revokeObjectURL(u)};const imp=$('#sImport');if(imp)imp.onclick=()=>{const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=()=>{const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.pages)state.pages=d.pages;if(d.folders)state.folders=d.folders;if(d.settings)state.settings={...state.settings,...d.settings};applyTheme();applyLanguage();if(state.pages.length)openPage(state.pages[0].id);renderSidebar();saveData()}catch(e){alert('Invalid JSON')}};r.readAsText(f)};i.click()};const clr=$('#sClear');if(clr)clr.onclick=()=>showDialog(t('clearData'),t('clearConfirm'),[{text:t('confirm'),cls:'danger',action:()=>{state.pages=[];state.folders=[];state.currentPageId=null;localStorage.removeItem('demnotes_data');const p=createPage(true);openPage(p.id);renderSidebar();saveData();closeDialog();closeSettingsView()}},{text:t('cancel'),cls:'secondary',action:closeDialog}])}
function showDialog(title,msg,buttons){$('#dialogTitle').textContent=title;$('#dialogMsg').textContent=msg;const ac=$('#dialogActions');ac.innerHTML='';buttons.forEach(b=>{const btn=document.createElement('button');btn.className=`dialog-btn ${b.cls}`;btn.textContent=b.text;btn.onclick=b.action;ac.appendChild(btn)});$('#dialogOverlay').classList.add('open')}
function closeDialog(){$('#dialogOverlay').classList.remove('open')}
function showInputDialog(title,def,cb){$('#dialogTitle').textContent=title;$('#dialogMsg').innerHTML=`<input class="dialog-input" id="dialogInput" type="text" value="${esc(def||'')}" autofocus>`;const ac=$('#dialogActions');ac.innerHTML='';const ok=document.createElement('button');ok.className='dialog-btn primary';ok.textContent=t('confirm');ok.onclick=()=>{cb($('#dialogInput').value);closeDialog()};const cn=document.createElement('button');cn.className='dialog-btn secondary';cn.textContent=t('cancel');cn.onclick=closeDialog;ac.appendChild(cn);ac.appendChild(ok);$('#dialogOverlay').classList.add('open');setTimeout(()=>{const inp=$('#dialogInput');if(inp)inp.focus()},100)}
function setBottomTab(tab){$$('.bottombar-item').forEach(el=>el.classList.remove('active'));const btn=$(`.bottombar-item[data-tab="${tab}"]`);if(btn)btn.classList.add('active')}
function closeAllViews(){closeSearchView();closeHowToView();closeSettingsView()}
function showFolderPicker(pid){const page=state.pages.find(p=>p.id===pid);if(!page)return;let btns=[{text:t('noFolder'),cls:'secondary',action:()=>{page.folderId=null;renderSidebar();saveData();closeDialog()}}];state.folders.forEach(f=>{btns.push({text:`${f.icon||'📁'} ${f.name}`,cls:'primary',action:()=>{page.folderId=f.id;renderSidebar();saveData();closeDialog()}})});btns.push({text:t('cancel'),cls:'secondary',action:closeDialog});showDialog(t('moveToFolder'),'',btns)}
function initEvents(){$('#menuBtn').onclick=openSidebar;$('#themeBtn').onclick=()=>{const ts=THEMES.map(t=>t.id);const i=ts.indexOf(state.settings.theme);state.settings.theme=ts[(i+1)%ts.length];applyTheme();saveData()};$('#langBtn').onclick=cycleLang;$('#sidebarOverlay').onclick=closeSidebar;$('#sidebarNewBtn').onclick=()=>{const p=createPage();openPage(p.id)};$('#sidebarNewFolderBtn').onclick=()=>showInputDialog(t('folderName'),'',name=>{if(name.trim()){state.folders.push({id:uid(),name:name.trim(),icon:'📁',_open:true});renderSidebar();saveData()}});$('#sidebarSettingsBtn').onclick=()=>{closeSidebar();openSettingsView()};
$('#sidebarPages').addEventListener('click',e=>{const del=e.target.closest('.sidebar-page-del');if(del){e.stopPropagation();const pid=del.getAttribute('data-del-id');showDialog(t('deleteNote'),t('deleteNoteConfirm'),[{text:t('confirm'),cls:'danger',action:()=>{closeDialog();deletePage(pid)}},{text:t('cancel'),cls:'secondary',action:closeDialog}]);return}const star=e.target.closest('.sidebar-page-star');if(star){e.stopPropagation();const pid=star.getAttribute('data-star-id');const p=state.pages.find(pg=>pg.id===pid);if(p){p.isFavorite=!p.isFavorite;renderSidebar();saveData()}return}const item=e.target.closest('.sidebar-page-item');if(item)openPage(item.getAttribute('data-page-id'))});
$('#sidebarPages').addEventListener('touchstart',e=>{const item=e.target.closest('.sidebar-page-item');if(!item)return;longPressTimer=setTimeout(()=>{const pid=item.getAttribute('data-page-id');const page=state.pages.find(p=>p.id===pid);if(!page)return;const menu=$('#pageCtxMenu');let fm='';if(state.folders.length)fm=`<div class="ctx-item" data-action="movefolder"><span class="ctx-item-icon">📂</span>${t('moveToFolder')}</div>`;menu.innerHTML=`<div class="ctx-item" data-action="fav"><span class="ctx-item-icon">${page.isFavorite?'☆':'⭐'}</span>${page.isFavorite?t('unfavorite'):t('favorite')}</div>${fm}<div class="ctx-item danger" data-action="del"><span class="ctx-item-icon">🗑️</span>${t('delete')}</div>`;const touch=e.touches[0];menu.style.left=Math.min(touch.clientX,innerWidth-180)+'px';menu.style.top=Math.min(touch.clientY,innerHeight-120)+'px';menu.classList.add('open');menu.querySelectorAll('.ctx-item').forEach(el=>{el.onclick=()=>{menu.classList.remove('open');const a=el.getAttribute('data-action');if(a==='fav'){page.isFavorite=!page.isFavorite;renderSidebar();saveData()}if(a==='del')deletePage(pid);if(a==='movefolder')showFolderPicker(pid)}});setTimeout(()=>{const cl=ev=>{if(!menu.contains(ev.target)){menu.classList.remove('open');document.removeEventListener('click',cl)}};document.addEventListener('click',cl)},50)},500)},{passive:false});
$('#sidebarPages').addEventListener('touchend',()=>clearTimeout(longPressTimer));$('#sidebarPages').addEventListener('touchmove',()=>clearTimeout(longPressTimer));
$('#tabHome').onclick=()=>{closeAllViews();activeView='home';setBottomTab('home');if(state.currentPageId)renderPage()};$('#tabSearch').onclick=()=>{closeAllViews();openSearchView()};$('#tabNew').onclick=()=>{closeAllViews();const p=createPage();openPage(p.id)};$('#tabHowTo').onclick=()=>{closeAllViews();openHowToView()};$('#tabSettings').onclick=()=>{closeAllViews();openSettingsView()};
$('#searchInput').oninput=e=>performSearch(e.target.value);$('#searchCancel').onclick=()=>{closeSearchView();activeView='home';setBottomTab('home')};$('#howtoBack').onclick=()=>{closeHowToView();activeView='home';setBottomTab('home')};$('#settingsBack').onclick=()=>{closeSettingsView();activeView='home';setBottomTab('home')};$('#cmdOverlay').onclick=closeCommandMenu;$('#cmdSearch').oninput=e=>renderCmdList(e.target.value);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCommandMenu();closeAllViews();closeDialog();closeSidebar();$('#emojiPicker').classList.remove('open');$('#coverPicker').classList.remove('open');$('#ctxMenu').classList.remove('open');$('#pageCtxMenu').classList.remove('open')}});
// Swipe gestures
document.body.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY},{passive:true});document.body.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-touchStartX;const dy=e.changedTouches[0].clientY-touchStartY;if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){if(dx>0&&touchStartX<40)openSidebar();if(dx<0&&$('#sidebar').classList.contains('open'))closeSidebar()}},{passive:true});
if(window.visualViewport){window.visualViewport.addEventListener('resize',()=>{const tb=$('#fmtToolbar');if(tb.classList.contains('show')){const v=window.visualViewport;tb.style.bottom=(innerHeight-v.height-v.offsetTop)+'px'}})}}
function init(){loadData();applyTheme();applyLanguage();if(state.settings.onboarded){$('#onboarding').classList.add('hidden');$('#app').style.display='';if(!state.pages.length){const p=createPage(true);state.currentPageId=p.id;state.settings.lastOpenedPageId=p.id;saveData()}else state.currentPageId=state.settings.lastOpenedPageId||state.pages[0]?.id;renderSidebar();if(state.currentPageId)renderPage()}
$$('.ob-lang').forEach(el=>{el.onclick=()=>{state.settings.language=el.getAttribute('data-lang');state.settings.onboarded=true;applyLanguage();$('#onboarding').classList.add('hidden');$('#app').style.display='';const p=createPage(true);state.currentPageId=p.id;state.settings.lastOpenedPageId=p.id;renderSidebar();renderPage();saveData()}});initEvents()}
init();
</script>
