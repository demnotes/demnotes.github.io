<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DemNotes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
:root{--bg:#0a0a0a;--sidebar-bg:#111;--card-hover:#1a1a1a;--border:#2a2a2a;--text-primary:#e8e8e8;--text-secondary:#888;--accent:#7c5cfc;--accent-hover:#9b7ffe;--accent-dim:rgba(124,92,252,.12);--overlay:rgba(0,0,0,.6);--code-bg:#161616;--callout-bg:rgba(124,92,252,.08);--highlight:rgba(255,230,0,.25);--danger:#e5484d;--success:#30a46c;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--topbar-h:54px;--bottombar-h:62px;--font-body:'Inter',sans-serif;--font-heading:'Playfair Display',serif;--font-mono:'JetBrains Mono',monospace;--radius:10px;--radius-sm:6px;--tr:250ms ease}
[data-theme="light"]{--bg:#fff;--sidebar-bg:#f7f7f5;--card-hover:#f0f0ee;--border:#e0e0e0;--text-primary:#1a1a1a;--text-secondary:#666;--accent:#6b4fcc;--accent-hover:#7c5cfc;--accent-dim:rgba(107,79,204,.1);--overlay:rgba(0,0,0,.35);--code-bg:#f4f4f4;--callout-bg:rgba(107,79,204,.07);--highlight:rgba(255,230,0,.35)}
[data-theme="dark-blue"]{--bg:#080e1c;--sidebar-bg:#0c1428;--card-hover:#121c34;--border:#1a2844;--text-primary:#d0ddf0;--text-secondary:#6880a4;--accent:#3b82f6;--accent-hover:#60a5fa;--accent-dim:rgba(59,130,246,.12);--overlay:rgba(0,0,0,.65);--code-bg:#0a1020;--callout-bg:rgba(59,130,246,.08)}
[data-theme="light-blue"]{--bg:#f0f5ff;--sidebar-bg:#e0eafc;--card-hover:#d0dff5;--border:#b0c8e8;--text-primary:#0f1d2e;--text-secondary:#4a6585;--accent:#2563eb;--accent-hover:#3b82f6;--accent-dim:rgba(37,99,235,.1);--overlay:rgba(0,0,0,.3);--code-bg:#dce6f8}
[data-theme="dark-pink"]{--bg:#14080e;--sidebar-bg:#1c0c16;--card-hover:#28121e;--border:#3e1a2e;--text-primary:#f0d0e0;--text-secondary:#a06888;--accent:#ec4899;--accent-hover:#f472b6;--accent-dim:rgba(236,72,153,.12);--overlay:rgba(0,0,0,.65);--code-bg:#160810}
[data-theme="light-pink"]{--bg:#fff0f5;--sidebar-bg:#fce4ee;--card-hover:#f8d0e0;--border:#e8a8c0;--text-primary:#2e0f1c;--text-secondary:#88506a;--accent:#db2777;--accent-hover:#ec4899;--accent-dim:rgba(219,39,119,.1);--overlay:rgba(0,0,0,.3);--code-bg:#fce0ec}
[data-theme="dark-orange"]{--bg:#140e08;--sidebar-bg:#1c140a;--card-hover:#281c10;--border:#3e2a16;--text-primary:#f0e0cc;--text-secondary:#a08860;--accent:#ea580c;--accent-hover:#f97316;--accent-dim:rgba(234,88,12,.12);--overlay:rgba(0,0,0,.65);--code-bg:#160e06}
[data-theme="light-orange"]{--bg:#fff8f0;--sidebar-bg:#fceee0;--card-hover:#f8e0cc;--border:#e8c8a0;--text-primary:#2e1c0f;--text-secondary:#886840;--accent:#ea580c;--accent-hover:#f97316;--accent-dim:rgba(234,88,12,.1);--overlay:rgba(0,0,0,.3);--code-bg:#fcf0e4}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font-body);font-size:15px;line-height:1.6;color:var(--text-primary);background:var(--bg);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;transition:background var(--tr),color var(--tr)}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea{font-family:inherit;font-size:inherit;color:inherit}
a{color:var(--accent);text-decoration:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes blockIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ONBOARDING */
.onboarding{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center}
.onboarding.hidden{display:none}
.ob-logo{width:72px;height:72px;border-radius:18px;overflow:hidden;margin-bottom:4px;animation:scaleIn 500ms ease}
.ob-logo img{width:100%;height:100%}
.ob-title{font-family:var(--font-heading);font-size:26px;font-weight:700;animation:fadeUp 500ms ease 100ms both}
.ob-sub{color:var(--text-secondary);font-size:13px;margin-bottom:4px;animation:fadeUp 500ms ease 200ms both}
.ob-step{display:none;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:280px;animation:fadeUp 400ms ease}
.ob-step.active{display:flex}
.ob-step-label{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text-primary)}
.ob-btn{padding:14px 18px;border-radius:var(--radius);background:var(--card-hover);border:2px solid var(--border);font-size:15px;font-weight:500;display:flex;align-items:center;gap:12px;transition:all 200ms;width:100%;color:var(--text-primary)}
.ob-btn:active{border-color:var(--accent);background:var(--accent-dim);transform:scale(.97)}
.ob-theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.ob-theme-btn{padding:14px 10px;border-radius:var(--radius);background:var(--card-hover);border:2px solid var(--border);font-size:12px;font-weight:500;text-align:center;transition:all 200ms}
.ob-theme-btn:active{border-color:var(--accent)}
.ob-theme-dot{width:24px;height:24px;border-radius:50%;margin:0 auto 6px;border:1px solid rgba(128,128,128,.3)}

/* APP */
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:calc(var(--topbar-h)+var(--safe-top));padding-top:calc(var(--safe-top)+4px);display:flex;align-items:center;justify-content:space-between;padding-left:10px;padding-right:10px;background:var(--bg);border-bottom:1px solid var(--border);transition:background var(--tr),border-color var(--tr);gap:4px}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:2px;flex-shrink:0}
.topbar-center{flex:1;min-width:0;text-align:center}
.topbar-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;margin:0 auto;background:none;border:none;color:var(--text-primary);text-align:center;outline:none;padding:4px 8px;border-radius:var(--radius-sm)}
.topbar-title:focus{background:var(--card-hover)}
.icon-btn{width:38px;height:38px;min-width:38px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);transition:background 150ms;font-size:18px}
.icon-btn:active{background:var(--card-hover)}
.icon-btn svg{width:20px;height:20px;stroke:var(--text-primary);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.lang-btn{font-size:10px;font-weight:600;padding:3px 6px;border-radius:4px;background:var(--card-hover);color:var(--text-secondary);min-width:28px;text-align:center}
.saved-indicator{position:fixed;top:calc(var(--topbar-h)+var(--safe-top)+8px);left:50%;transform:translateX(-50%);font-size:11px;color:var(--success);font-weight:500;opacity:0;transition:opacity 200ms;z-index:101;pointer-events:none;background:var(--bg);padding:2px 10px;border-radius:12px;border:1px solid var(--border)}
.saved-indicator.show{opacity:1}

/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;z-index:200;background:var(--overlay);opacity:0;visibility:hidden;transition:opacity var(--tr),visibility var(--tr)}
.sidebar-overlay.open{opacity:1;visibility:visible}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;max-width:80vw;z-index:201;background:var(--sidebar-bg);transform:translateX(-100%);transition:transform var(--tr);display:flex;flex-direction:column;padding-top:var(--safe-top);overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sidebar-header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-logo{width:28px;height:28px;border-radius:7px;overflow:hidden}
.sidebar-logo img{width:100%;height:100%}
.sidebar-brand{font-size:17px;font-weight:600;letter-spacing:-.3px}
.sidebar-actions{display:flex;gap:6px;margin:10px 14px}
.sidebar-act-btn{flex:1;padding:9px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);font-weight:500;font-size:12px;display:flex;align-items:center;justify-content:center;gap:4px}
.sidebar-act-btn.sec{background:var(--card-hover);color:var(--text-primary);border:1px solid var(--border)}
.sidebar-section-label{font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px;padding:10px 16px 4px}
.sidebar-pages{flex:1;overflow-y:auto;padding-bottom:10px}
.sidebar-page-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;transition:background 120ms}
.sidebar-page-item:active,.sidebar-page-item.active{background:var(--card-hover)}
.sidebar-page-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.sidebar-page-title{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-page-del{font-size:13px;color:var(--danger);padding:4px 6px;border-radius:4px;opacity:.6}
.sidebar-page-star{font-size:12px;color:var(--text-secondary);opacity:.5;padding:4px}
.sidebar-page-star.fav{color:#f5a623;opacity:1}
.sidebar-folder-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;transition:background 120ms}
.sidebar-folder-item:active{background:var(--card-hover)}
.sidebar-folder-title{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-folder-arrow{color:var(--text-secondary);font-size:10px;transition:transform 200ms}
.sidebar-folder-arrow.open{transform:rotate(90deg)}
.sidebar-folder-children{padding-left:16px;display:none}
.sidebar-folder-children.open{display:block}
.sidebar-footer{padding:10px 16px;border-top:1px solid var(--border)}

/* MAIN */
.main{flex:1;margin-top:calc(var(--topbar-h)+var(--safe-top));margin-bottom:calc(var(--bottombar-h)+var(--safe-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch}
.page-cover{height:72px;width:100%;cursor:pointer;position:relative}
.page-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,var(--bg))}
.page-header{padding:12px 20px 8px;animation:fadeUp 300ms ease}
.page-icon-btn{font-size:42px;cursor:pointer;line-height:1;display:block;margin-bottom:6px;transition:transform 150ms}
.page-icon-btn:active{transform:scale(.85)}
.page-icon-img{width:42px;height:42px;border-radius:8px;object-fit:cover;cursor:pointer;display:block;margin-bottom:6px}
.page-title-input{display:block;width:100%;font-family:var(--font-heading);font-size:28px;font-weight:700;background:none;border:none;color:var(--text-primary);outline:none;padding:6px 0 2px;line-height:1.3}
.page-title-input::placeholder{color:var(--text-secondary)}
.page-meta{font-size:11px;color:var(--text-secondary);padding:4px 0 8px}
.page-add-block-bar{display:flex;gap:8px;padding:4px 16px 10px}
.page-add-block-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius);background:var(--card-hover);border:1px solid var(--border);font-size:13px;font-weight:500;color:var(--text-secondary);transition:all 150ms}
.page-add-block-btn:active{border-color:var(--accent);color:var(--accent);transform:scale(.97)}
.page-export-btn{padding:8px 14px;border-radius:var(--radius);background:var(--card-hover);border:1px solid var(--border);font-size:13px;color:var(--text-secondary)}

/* BLOCKS */
.blocks-container{padding:0 16px 20px}
.block-wrapper{position:relative;padding:2px 0;margin:1px 0;animation:blockIn 200ms ease both}
.block-content{outline:none;min-height:1.6em;padding:3px 4px;border-radius:3px;word-wrap:break-word;overflow-wrap:break-word}
.block-content:empty::before{content:attr(data-placeholder);color:var(--text-secondary);pointer-events:none}
.block-content.h1{font-family:var(--font-heading);font-size:26px;font-weight:700;line-height:1.3;padding:6px 4px 2px}
.block-content.h2{font-size:20px;font-weight:600;padding:5px 4px 2px}
.block-content.h3{font-size:16px;font-weight:600;padding:4px 4px 2px}
.block-todo{display:flex;align-items:flex-start;gap:8px}
.todo-check{width:20px;height:20px;min-width:20px;margin-top:4px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 150ms;font-size:13px}
.todo-check.checked{background:var(--accent);border-color:var(--accent);color:#fff}
.block-content.done{text-decoration:line-through;color:var(--text-secondary)}
.block-bullet{display:flex;align-items:flex-start;gap:8px}
.block-bullet::before{content:'•';color:var(--text-secondary);font-size:20px;line-height:1.6;flex-shrink:0}
.block-numbered{display:flex;align-items:flex-start;gap:8px}
.block-num-label{color:var(--text-secondary);font-size:14px;font-weight:500;line-height:1.6;flex-shrink:0;min-width:20px}
.block-code-wrap{background:var(--code-bg);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden}
.block-code-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;font-size:11px;color:var(--text-secondary);border-bottom:1px solid var(--border)}
.block-code-copy{font-size:11px;color:var(--accent);padding:2px 8px;border-radius:4px}
.block-content.code{font-family:var(--font-mono);font-size:13px;line-height:1.5;padding:10px 12px;white-space:pre-wrap}
.block-quote-wrap{border-left:3px solid var(--accent);padding-left:14px}
.block-content.quote{font-style:italic;color:var(--text-secondary)}
.block-callout{display:flex;gap:10px;align-items:flex-start;background:var(--callout-bg);border-radius:var(--radius-sm);padding:12px;border:1px solid var(--border)}
.callout-emoji{font-size:20px;flex-shrink:0;cursor:pointer}
.block-divider{height:1px;background:var(--border);margin:12px 0}
.block-image img{width:100%;border-radius:var(--radius-sm);display:block;cursor:pointer}
.block-image .image-caption{font-size:12px;color:var(--text-secondary);text-align:center;padding:4px;outline:none;min-height:1.3em}
.block-image .image-caption:empty::before{content:attr(data-placeholder);color:var(--text-secondary);opacity:.5}
.block-image-actions{display:flex;gap:8px;padding:8px 0;flex-wrap:wrap}
.block-image-actions button{padding:8px 14px;border-radius:var(--radius-sm);background:var(--card-hover);font-size:12px;font-weight:500;border:1px solid var(--border)}
.block-pdf-wrap{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.block-pdf-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card-hover);font-size:12px;font-weight:500}
.block-pdf-open{margin-left:auto;color:var(--accent);font-size:11px}
.block-pdf-wrap iframe{width:100%;height:350px;border:none}
.block-drawing img{width:100%;border-radius:var(--radius-sm);display:block;cursor:pointer;border:1px solid var(--border)}
.block-audio audio{width:100%;margin:8px 0}
.block-media-bar{display:flex;gap:6px;padding:4px 0;flex-wrap:wrap}
.block-media-bar button{padding:6px 10px;border-radius:var(--radius-sm);background:var(--card-hover);border:1px solid var(--border);font-size:11px;color:var(--text-secondary)}

/* DRAWING */
.drawing-overlay{position:fixed;inset:0;z-index:300;background:var(--bg);display:none;flex-direction:column}
.drawing-overlay.open{display:flex}
.drawing-toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;padding-top:calc(8px+var(--safe-top));background:var(--sidebar-bg);border-bottom:1px solid var(--border);flex-wrap:wrap}
.draw-tool-btn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;border:1px solid transparent}
.draw-tool-btn.active{border-color:var(--accent);background:var(--accent-dim)}
.draw-color{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.draw-color.active{border-color:var(--text-primary)}
.draw-size-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid transparent}
.draw-size-btn.active{border-color:var(--accent)}
.drawing-canvas-area{flex:1;overflow:hidden;background:#fff}
.drawing-canvas-area canvas{touch-action:none;width:100%;height:100%}
.drawing-bottom-bar{display:flex;gap:10px;padding:10px 16px;padding-bottom:calc(10px+var(--safe-bottom));background:var(--sidebar-bg);border-top:1px solid var(--border);justify-content:flex-end}
.draw-action-btn{padding:8px 18px;border-radius:var(--radius-sm);font-weight:500;font-size:13px}
.draw-action-btn.primary{background:var(--accent);color:#fff}
.draw-action-btn.sec{background:var(--card-hover);border:1px solid var(--border)}
.draw-action-btn.danger{color:var(--danger)}

/* BOTTOM NAV */
.bottombar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:calc(var(--bottombar-h)+var(--safe-bottom));padding-bottom:var(--safe-bottom);display:flex;align-items:center;justify-content:space-around;background:var(--bg);border-top:1px solid var(--border);transition:background var(--tr)}
.bottombar-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 4px;border-radius:8px;min-width:42px;transition:color 150ms,transform 100ms;color:var(--text-secondary)}
.bottombar-item.active{color:var(--accent)}
.bottombar-item:active{transform:scale(.9)}
.bottombar-item svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bottombar-label{font-size:8px;font-weight:500}
.bottombar-add{width:40px;height:40px;border-radius:12px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform 120ms}
.bottombar-add:active{transform:scale(.88)}

/* CMD MENU */
.cmd-overlay{position:fixed;inset:0;z-index:250;background:var(--overlay);opacity:0;visibility:hidden;transition:opacity 300ms,visibility 300ms}
.cmd-overlay.open{opacity:1;visibility:visible}
.cmd-sheet{position:fixed;bottom:0;left:0;right:0;z-index:251;max-height:55vh;background:var(--sidebar-bg);border-radius:16px 16px 0 0;padding-bottom:var(--safe-bottom);transform:translateY(100%);transition:transform 300ms ease;display:flex;flex-direction:column}
.cmd-sheet.open{transform:translateY(0)}
.cmd-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 6px}
.cmd-search{margin:4px 16px 8px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:14px;outline:none}
.cmd-search::placeholder{color:var(--text-secondary)}
.cmd-list{overflow-y:auto;padding:0 8px 12px}
.cmd-section-label{font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px;padding:8px 12px 4px}
.cmd-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background 100ms}
.cmd-item:active{background:var(--card-hover)}
.cmd-item-icon{width:32px;height:32px;border-radius:8px;background:var(--card-hover);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.cmd-item-title{font-size:13px;font-weight:500}
.cmd-item-desc{font-size:10px;color:var(--text-secondary)}

/* FORMAT TOOLBAR */
.fmt-toolbar{position:fixed;left:0;right:0;z-index:150;background:var(--sidebar-bg);border-top:1px solid var(--border);display:none;overflow-x:auto;padding:8px;gap:4px;white-space:nowrap}
.fmt-toolbar.show{display:flex}
.fmt-btn{min-width:42px;height:40px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius);font-size:16px;font-weight:600;color:var(--text-primary);transition:all 100ms;flex-shrink:0;padding:0 8px}
.fmt-btn:active{background:var(--accent-dim);color:var(--accent);transform:scale(.92)}
.fmt-color-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border)}

/* VIEWS */
.view-panel{position:fixed;inset:0;z-index:180;background:var(--bg);display:none;flex-direction:column;padding-top:var(--safe-top);transition:background var(--tr)}
.view-panel.open{display:flex;animation:fadeUp 250ms ease}
.view-header{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);font-size:16px;font-weight:600}
.view-back{font-size:20px;padding:4px}
.view-content{flex:1;overflow-y:auto;padding:12px 16px}
.search-input{flex:1;padding:10px 14px;background:var(--card-hover);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:15px;outline:none}
.search-input::placeholder{color:var(--text-secondary)}
.search-cancel{color:var(--accent);font-weight:500;font-size:14px;padding:8px}
.search-result-item{display:flex;align-items:flex-start;gap:12px;padding:10px;border-radius:var(--radius-sm);cursor:pointer}
.search-result-item:active{background:var(--card-hover)}
.search-result-icon{font-size:18px;flex-shrink:0}
.search-result-title{font-size:14px;font-weight:500}
.search-result-snippet{font-size:11px;color:var(--text-secondary);margin-top:2px}
.search-empty{text-align:center;padding:40px 20px;color:var(--text-secondary);font-size:14px}
.howto-section{margin-bottom:16px}
.howto-section h3{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--accent)}
.howto-section p{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:4px}
.howto-tip{display:flex;gap:8px;padding:8px 10px;background:var(--card-hover);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:5px;font-size:12px;align-items:center}
.settings-group{margin-bottom:16px}
.settings-group-label{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
.settings-item-label{font-size:13px}
.settings-lang-options{display:flex;gap:4px;flex-wrap:wrap}
.settings-lang-opt{padding:5px 10px;border-radius:var(--radius-sm);background:var(--card-hover);border:1px solid var(--border);font-size:11px;font-weight:500;transition:all 120ms}
.settings-lang-opt.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:6px}
.theme-opt{padding:6px 2px;border-radius:var(--radius-sm);border:2px solid var(--border);text-align:center;font-size:9px;font-weight:500;cursor:pointer;line-height:1.2}
.theme-opt.active{border-color:var(--accent)}
.theme-opt-dot{width:18px;height:18px;border-radius:50%;margin:0 auto 3px;border:1px solid rgba(128,128,128,.3)}
.settings-btn{width:100%;padding:11px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;text-align:center;background:var(--card-hover);border:1px solid var(--border);margin-bottom:6px}
.settings-btn:active{background:var(--accent-dim)}
.settings-btn.danger{color:var(--danger);border-color:var(--danger)}
.settings-about{text-align:center;padding:14px;font-size:12px;color:var(--text-secondary);line-height:1.6}

/* AI CHAT */
.ai-chat{display:flex;flex-direction:column;height:100%}
.ai-messages{flex:1;overflow-y:auto;padding:12px}
.ai-msg{padding:10px 14px;border-radius:var(--radius);margin-bottom:8px;font-size:13px;line-height:1.6;max-width:88%;animation:fadeUp 200ms ease}
.ai-msg.user{background:var(--accent);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.ai-msg.ai{background:var(--card-hover);border:1px solid var(--border);margin-right:auto;border-bottom-left-radius:4px}
.ai-msg.ai .ai-label{font-size:10px;font-weight:600;color:var(--accent);margin-bottom:4px}
.ai-msg pre{white-space:pre-wrap;font-family:var(--font-mono);font-size:12px;background:var(--code-bg);padding:8px;border-radius:4px;margin:6px 0}
.ai-input-bar{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:var(--sidebar-bg);padding-bottom:calc(10px+var(--safe-bottom))}
.ai-input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:14px;outline:none;resize:none;max-height:80px}
.ai-send{width:40px;height:40px;border-radius:var(--radius);background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ai-send:active{transform:scale(.9)}
.ai-model-bar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text-secondary)}
.ai-model-bar input{flex:1;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:11px;outline:none;font-family:var(--font-mono)}
.ai-tools{display:flex;gap:4px;padding:6px 12px;flex-wrap:wrap}
.ai-tool-btn{padding:5px 10px;border-radius:var(--radius-sm);background:var(--card-hover);border:1px solid var(--border);font-size:10px;font-weight:500;color:var(--text-secondary)}
.ai-tool-btn:active{border-color:var(--accent);color:var(--accent)}
.ai-key-bar{padding:10px 12px;border-bottom:1px solid var(--border)}
.ai-key-bar input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:12px;outline:none}

/* EMOJI PICKER */
.emoji-picker{position:fixed;z-index:260;left:0;right:0;bottom:0;background:var(--sidebar-bg);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:14px 12px;padding-bottom:calc(14px+var(--safe-bottom));box-shadow:0 -8px 32px rgba(0,0,0,.3);display:none;max-height:50vh;overflow-y:auto}
.emoji-picker.open{display:block;animation:slideUp 250ms ease}
.emoji-search{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;outline:none;margin-bottom:10px}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;justify-items:center}
.emoji-cell{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:22px;border-radius:8px;cursor:pointer}
.emoji-cell:active{background:var(--card-hover)}
.emoji-actions{display:flex;gap:8px;margin-bottom:10px}
.emoji-actions button{padding:6px 12px;border-radius:var(--radius-sm);background:var(--card-hover);border:1px solid var(--border);font-size:11px}

/* COVER/CTX/DIALOG */
.cover-picker{position:absolute;top:70px;left:16px;right:16px;z-index:120;background:var(--sidebar-bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;box-shadow:0 8px 32px rgba(0,0,0,.3);display:none}
.cover-picker.open{display:block;animation:scaleIn 150ms ease}
.cover-options{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cover-opt{height:36px;border-radius:var(--radius-sm);cursor:pointer;border:2px solid transparent}
.cover-opt.active{border-color:var(--accent)}
.ctx-menu,.page-ctx-menu{position:fixed;z-index:260;background:var(--sidebar-bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px;box-shadow:0 8px 32px rgba(0,0,0,.3);min-width:160px;display:none}
.ctx-menu.open,.page-ctx-menu.open{display:block;animation:scaleIn 150ms ease}
.ctx-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer}
.ctx-item:active{background:var(--card-hover)}
.ctx-item.danger{color:var(--danger)}
.dialog-overlay{position:fixed;inset:0;z-index:500;background:var(--overlay);display:none;align-items:center;justify-content:center;padding:20px}
.dialog-overlay.open{display:flex}
.dialog-overlay.open .dialog-box{animation:scaleIn 200ms ease}
.dialog-box{background:var(--sidebar-bg);border-radius:var(--radius);padding:20px;max-width:300px;width:100%;border:1px solid var(--border)}
.dialog-title{font-size:16px;font-weight:600;margin-bottom:6px}
.dialog-msg{font-size:13px;color:var(--text-secondary);margin-bottom:14px;line-height:1.5}
.dialog-actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
.dialog-btn{padding:7px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:500}
.dialog-btn.primary{background:var(--accent);color:#fff}
.dialog-btn.sec{background:var(--card-hover);border:1px solid var(--border)}
.dialog-btn.danger{background:var(--danger);color:#fff}
.dialog-input{width:100%;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text-primary);margin-bottom:10px;outline:none;font-size:13px}
mark{background:var(--highlight);padding:1px 2px;border-radius:2px}
.block-content a{color:var(--accent);text-decoration:underline}
code:not(.block-content){font-family:var(--font-mono);font-size:.85em;background:var(--code-bg);padding:1px 4px;border-radius:3px}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

function uid(){return crypto.randomUUID?crypto.randomUUID():'xxxx-4xxx-yxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)})}
function t(k){return i18n[state.settings.language]?.[k]||i18n.en[k]||k}
function $(s){return document.querySelector(s)}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let state={pages:[],folders:[],currentPageId:null,settings:{theme:'dark',language:'tr',lastOpenedPageId:null,onboarded:false,aiApiKey:'',aiModel:'google/gemini-2.0-flash-001',aiChats:[]}};

function loadData(){try{const r=localStorage.getItem('demnotes_data');if(r){const p=JSON.parse(r);state.pages=p.pages||[];state.folders=p.folders||[];state.settings={...state.settings,...p.settings}}}catch(e){}}
function saveData(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{try{localStorage.setItem('demnotes_data',JSON.stringify({pages:state.pages,folders:state.folders,settings:state.settings}));showSaved()}catch(e){}},400)}
function showSaved(){const el=$('#savedIndicator');el.textContent=t('saved');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200)}

function detectSystemTheme(){return window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'}
function applyTheme(){document.documentElement.setAttribute('data-theme',state.settings.theme);$('#themeBtn').textContent=state.settings.theme.startsWith('dark')?'🌙':'☀️'}
function applyLanguage(){$('#langBtn').textContent=state.settings.language.toUpperCase();$$('[data-i18n]').forEach(el=>el.textContent=t(el.getAttribute('data-i18n')));const si=$('#searchInput');if(si)si.placeholder=t('searchPlaceholder');const cs=$('#cmdSearch');if(cs)cs.placeholder=t('cmdPlaceholder');const ti=$('#topbarTitle');if(ti)ti.placeholder=t('pageTitle')}
function cycleLang(){const l=['tr','en','de','ru'];state.settings.language=l[(l.indexOf(state.settings.language)+1)%l.length];applyLanguage();if(state.currentPageId)renderPage();renderSidebar();saveData()}
function openSidebar(){$('#sidebar').classList.add('open');$('#sidebarOverlay').classList.add('open')}
function closeSidebar(){$('#sidebar').classList.remove('open');$('#sidebarOverlay').classList.remove('open')}

function renderSidebar(){const c=$('#sidebarPages');let h='';
if(state.folders.length){h+=`<div class="sidebar-section-label">📁 ${t('newFolder')}</div>`;state.folders.forEach(f=>{const pages=state.pages.filter(p=>p.folderId===f.id);const io=f._open?'open':'';h+=`<div class="sidebar-folder-item" data-folder-id="${f.id}"><span style="font-size:16px;width:20px;text-align:center">${f.icon||'📁'}</span><span class="sidebar-folder-title">${f.name||t('untitled')}</span><span class="sidebar-folder-arrow ${io}">▶</span></div><div class="sidebar-folder-children ${io}" data-fc="${f.id}">`;pages.forEach(p=>h+=spHTML(p));h+=`</div>`})}
const favs=state.pages.filter(p=>p.isFavorite&&!p.folderId);if(favs.length){h+=`<div class="sidebar-section-label">⭐ ${t('favorite')}</div>`;favs.forEach(p=>h+=spHTML(p))}
const others=state.pages.filter(p=>!p.isFavorite&&!p.folderId);h+=`<div class="sidebar-section-label">📄 ${t('home')}</div>`;others.forEach(p=>h+=spHTML(p));c.innerHTML=h;
c.querySelectorAll('.sidebar-folder-item').forEach(el=>{el.onclick=()=>{const f=state.folders.find(fl=>fl.id===el.getAttribute('data-folder-id'));if(f)f._open=!f._open;renderSidebar()};let ft;el.addEventListener('touchstart',e=>{ft=setTimeout(()=>openFolderCtx(e.touches[0],el.getAttribute('data-folder-id')),500)},{passive:true});el.addEventListener('touchend',()=>clearTimeout(ft));el.addEventListener('touchmove',()=>clearTimeout(ft))})}
function spHTML(p){const a=p.id===state.currentPageId?' active':'';const s=p.isFavorite?' fav':'';const iconHTML=p.iconImage?`<img src="${p.iconImage}" style="width:18px;height:18px;border-radius:4px;object-fit:cover">`:(p.icon||'📝');return`<div class="sidebar-page-item${a}" data-page-id="${p.id}"><span class="sidebar-page-icon">${iconHTML}</span><span class="sidebar-page-title">${p.title||t('untitled')}</span><button class="sidebar-page-del" data-del-id="${p.id}">✕</button><span class="sidebar-page-star${s}" data-star-id="${p.id}">${p.isFavorite?'★':'☆'}</span></div>`}

function openFolderCtx(touch,fid){const menu=$('#pageCtxMenu');const f=state.folders.find(fl=>fl.id===fid);if(!f)return;menu.innerHTML=`<div class="ctx-item" data-action="icon">🎨 ${t('changeIcon')}</div><div class="ctx-item" data-action="rename">✏️ ${t('rename')}</div><div class="ctx-item danger" data-action="del">🗑️ ${t('delete')}</div>`;menu.style.left=Math.min(touch.clientX,innerWidth-170)+'px';menu.style.top=Math.min(touch.clientY,innerHeight-130)+'px';menu.classList.add('open');menu.querySelectorAll('.ctx-item').forEach(el=>{el.onclick=()=>{menu.classList.remove('open');const a=el.getAttribute('data-action');if(a==='icon')openEmojiPicker(em=>{f.icon=em;renderSidebar();saveData()});if(a==='rename')showInputDialog(t('rename'),f.name,v=>{f.name=v;renderSidebar();saveData()});if(a==='del'){state.pages.filter(p=>p.folderId===fid).forEach(p=>p.folderId=null);state.folders=state.folders.filter(fl=>fl.id!==fid);renderSidebar();saveData()}}});autoCloseMenu(menu)}

function createPage(sample){const page={id:uid(),title:sample?t('welcomeTitle'):'',icon:sample?'👋':'📝',iconImage:null,coverColor:COVERS[Math.random()*COVERS.length|0],isFavorite:false,folderId:null,createdAt:Date.now(),updatedAt:Date.now(),blocks:[]};if(sample){page.blocks=[{id:uid(),type:'h1',content:t('welcomeTitle'),metadata:{}},{id:uid(),type:'paragraph',content:t('welcomeDesc'),metadata:{}},{id:uid(),type:'h2',content:t('features'),metadata:{}},{id:uid(),type:'bullet',content:t('feature1'),metadata:{}},{id:uid(),type:'bullet',content:t('feature2'),metadata:{}},{id:uid(),type:'bullet',content:t('feature3'),metadata:{}},{id:uid(),type:'bullet',content:t('feature4'),metadata:{}},{id:uid(),type:'todo',content:t('sampleTodo'),metadata:{checked:false}},{id:uid(),type:'paragraph',content:'',metadata:{}}]}else{page.blocks=[{id:uid(),type:'paragraph',content:'',metadata:{}}]}state.pages.unshift(page);return page}
function openPage(pid){state.currentPageId=pid;state.settings.lastOpenedPageId=pid;activeView='home';closeSidebar();closeAllViews();renderPage();renderSidebar();saveData();setBottomTab('home')}
function deletePage(pid){state.pages=state.pages.filter(p=>p.id!==pid);if(state.currentPageId===pid)state.currentPageId=state.pages.length?state.pages[0].id:null;if(state.currentPageId)renderPage();else $('#mainContent').innerHTML='';renderSidebar();saveData()}
function getCurrentPage(){return state.pages.find(p=>p.id===state.currentPageId)}

function renderPage(){const page=getCurrentPage();if(!page){$('#mainContent').innerHTML='';$('#topbarTitle').value='';return}$('#topbarTitle').value=page.title||t('untitled');let bH='',nc=0;page.blocks.forEach((b,i)=>{if(b.type==='numbered')nc++;else nc=0;bH+=renderBlock(b,i,nc)});const ds=new Date(page.createdAt).toLocaleDateString(state.settings.language==='tr'?'tr-TR':state.settings.language==='de'?'de-DE':state.settings.language==='ru'?'ru-RU':'en-US',{year:'numeric',month:'long',day:'numeric'});
const iconHTML=page.iconImage?`<img class="page-icon-img" src="${page.iconImage}" id="pageIconBtn">`:`<button class="page-icon-btn" id="pageIconBtn">${page.icon||'📝'}</button>`;
$('#mainContent').innerHTML=`<div class="page-cover" id="pageCover" style="background:${page.coverColor}"></div><div class="page-header">${iconHTML}<input type="text" class="page-title-input" id="pageTitleInput" value="${esc(page.title)}" placeholder="${t('pageTitle')}" spellcheck="false"><div class="page-meta">${t('created')}: ${ds}</div></div><div class="page-add-block-bar"><button class="page-add-block-btn" id="pageAddBlockBtn">＋ ${t('addBlock')}</button><button class="page-export-btn" id="pageExportBtn">📥 ${t('exportAs')}</button></div><div class="blocks-container" id="blocksContainer">${bH}</div><div style="padding:16px;text-align:center"><button class="settings-btn danger" id="pageDeleteBtn">🗑️ ${t('deleteNote')}</button></div>`;bindPageEvents()}

function renderBlock(b,idx,nc){const ph=b.type==='paragraph'?t('paragraphDesc'):b.type.startsWith('h')?t(b.type):'';switch(b.type){
case'paragraph':case'h1':case'h2':case'h3':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-content ${b.type}" contenteditable="true" data-placeholder="${ph}" data-block-id="${b.id}">${b.content}</div></div>`;
case'todo':const ck=b.metadata?.checked;return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-todo"><div class="todo-check${ck?' checked':''}" data-block-id="${b.id}">${ck?'✓':''}</div><div class="block-content${ck?' done':''}" contenteditable="true" data-placeholder="${t('todo')}" data-block-id="${b.id}">${b.content}</div></div></div>`;
case'bullet':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-bullet"><div class="block-content" contenteditable="true" data-placeholder="${t('bullet')}" data-block-id="${b.id}">${b.content}</div></div></div>`;
case'numbered':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-numbered"><span class="block-num-label">${nc}.</span><div class="block-content" contenteditable="true" data-placeholder="${t('numbered')}" data-block-id="${b.id}">${b.content}</div></div></div>`;
case'code':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-code-wrap"><div class="block-code-header"><span>Code</span><button class="block-code-copy" data-block-id="${b.id}">${t('copy')}</button></div><div class="block-content code" contenteditable="true" data-placeholder="${t('code')}" data-block-id="${b.id}">${b.content}</div></div></div>`;
case'quote':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-quote-wrap"><div class="block-content quote" contenteditable="true" data-placeholder="${t('quote')}" data-block-id="${b.id}">${b.content}</div></div></div>`;
case'callout':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-callout"><span class="callout-emoji" data-block-id="${b.id}">${b.metadata?.emoji||'💡'}</span><div class="block-content" contenteditable="true" data-placeholder="${t('callout')}" data-block-id="${b.id}">${b.content}</div></div></div>`;
case'divider':return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-divider"></div></div>`;
case'image':if(b.content)return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-image"><img src="${b.content}" data-block-id="${b.id}"><div class="image-caption" contenteditable="true" data-placeholder="${t('caption')}" data-block-id="${b.id}" data-field="caption">${b.metadata?.caption||''}</div><div class="block-media-bar"><button onclick="downloadMedia('${b.id}','image')">📥 ${t('download')}</button></div></div></div>`;return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-image-actions"><button data-action="upload-image" data-block-id="${b.id}">📁 ${t('uploadFile')}</button><button data-action="url-image" data-block-id="${b.id}">🔗 ${t('fromUrl')}</button></div></div>`;
case'audio':if(b.content)return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-audio"><audio controls src="${b.content}"></audio><div class="block-media-bar"><button onclick="downloadMedia('${b.id}','audio')">📥 ${t('download')}</button></div></div></div>`;return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-image-actions"><button data-action="upload-audio" data-block-id="${b.id}">🎵 ${t('uploadFile')}</button></div></div>`;
case'drawing':if(b.content)return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-drawing"><img src="${b.content}" data-block-id="${b.id}"></div></div>`;return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-image-actions"><button data-action="open-drawing" data-block-id="${b.id}">🎨 ${t('drawing')}</button></div></div>`;
case'pdf':if(b.content)return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-pdf-wrap"><div class="block-pdf-header">📄 ${b.metadata?.filename||'document.pdf'}<button class="block-pdf-open" data-block-id="${b.id}">${t('openNewTab')}</button></div><iframe src="${b.content}"></iframe><div class="block-media-bar"><button onclick="downloadMedia('${b.id}','pdf')">📥 ${t('download')}</button></div></div></div>`;return`<div class="block-wrapper" data-block-id="${b.id}"><div class="block-image-actions"><button data-action="upload-pdf" data-block-id="${b.id}">📄 ${t('uploadFile')}</button></div></div>`;

function downloadMedia(bid,type){const page=getCurrentPage();const b=page?.blocks.find(bl=>bl.id===bid);if(!b?.content)return;const a=document.createElement('a');a.href=b.content;a.download=b.metadata?.filename||(type==='image'?'image.png':type==='pdf'?'document.pdf':'audio.mp3');a.click()}

let blt;el.addEventListener('touchstart',e=>{blt=setTimeout(()=>openBlockCtx(e.touches[0],page.blocks.indexOf(block)),500)},{passive:true});el.addEventListener('touchend',()=>clearTimeout(blt),{passive:true});el.addEventListener('touchmove',()=>clearTimeout(blt),{passive:true})});

ct.querySelectorAll('[data-action="url-image"]').forEach(el=>{el.onclick=()=>{const u=prompt('URL:','https://');if(u){const b=page.blocks.find(bl=>bl.id===el.getAttribute('data-block-id'));if(b){b.content=u;page.updatedAt=Date.now();renderPage();saveData()}}}});

function uploadFile(bid,accept){const i=document.createElement('input');i.type='file';i.accept=accept;i.onchange=()=>{const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const p=getCurrentPage();const b=p.blocks.find(bl=>bl.id===bid);if(b){b.content=r.result;b.metadata=b.metadata||{};b.metadata.filename=f.name;p.updatedAt=Date.now();renderPage();saveData()}};r.readAsDataURL(f)};i.click()}

function insertBlockAt(idx,type){const page=getCurrentPage();if(!page)return;const b={id:uid(),type,content:'',metadata:{}};if(type==='callout')b.metadata.emoji='💡';page.blocks.splice(idx,0,b);
const nonText=['divider','image','drawing','pdf','audio'];if(nonText.includes(type)){const next=page.blocks[idx+1];if(!next||nonText.includes(next.type))page.blocks.splice(idx+1,0,{id:uid(),type:'paragraph',content:'',metadata:{}})}
page.updatedAt=Date.now();renderPage();saveData();setTimeout(()=>{const el=document.querySelector(`[data-block-id="${b.id}"][contenteditable]`);if(el){el.focus();const r=document.createRange();r.selectNodeContents(el);r.collapse(false);const s=window.getSelection();s.removeAllRanges();s.addRange(r)}else{const nb=page.blocks[idx+1];if(nb){const nel=document.querySelector(`[data-block-id="${nb.id}"][contenteditable]`);if(nel)nel.focus()}}},60)}
function deleteBlockAt(idx){const page=getCurrentPage();if(!page||page.blocks.length<=1)return;page.blocks.splice(idx,1);page.updatedAt=Date.now();renderPage();saveData();setTimeout(()=>{const pi=Math.max(0,idx-1);const pb=page.blocks[pi];if(pb){const el=document.querySelector(`[data-block-id="${pb.id}"][contenteditable]`);if(el){el.focus();const r=document.createRange();r.selectNodeContents(el);r.collapse(false);const s=window.getSelection();s.removeAllRanges();s.addRange(r)}}},60)}

function openCommandMenu(idx){cmdInsertIndex=idx;$('#cmdSearch').value='';renderCmdList('');$('#cmdOverlay').classList.add('open');$('#cmdSheet').classList.add('open');setTimeout(()=>$('#cmdSearch').focus(),350)}
function closeCommandMenu(){$('#cmdOverlay').classList.remove('open');$('#cmdSheet').classList.remove('open')}
function renderCmdList(filter){const lf=filter.toLowerCase();const secs={basic:t('basic'),lists:t('lists'),media:t('media'),other:t('other')};let h='',cs='';BLOCK_TYPES.forEach(bt=>{const n=t(bt.type),d=t(bt.type+'Desc');if(lf&&!n.toLowerCase().includes(lf)&&!d.toLowerCase().includes(lf))return;if(bt.section!==cs){cs=bt.section;h+=`<div class="cmd-section-label">${secs[cs]}</div>`}h+=`<div class="cmd-item" data-type="${bt.type}"><div class="cmd-item-icon">${bt.icon}</div><div><div class="cmd-item-title">${n}</div><div class="cmd-item-desc">${d}</div></div></div>`});if(!h)h=`<div class="search-empty">${t('noResults')}</div>`;$('#cmdList').innerHTML=h;$('#cmdList').querySelectorAll('.cmd-item').forEach(el=>{el.onclick=()=>{closeCommandMenu();const type=el.getAttribute('data-type');const page=getCurrentPage();if(page&&cmdInsertIndex<page.blocks.length){const ex=page.blocks[cmdInsertIndex];if(ex&&!ex.content&&ex.type==='paragraph'){ex.type=type;if(type==='callout')ex.metadata={emoji:'💡'};page.updatedAt=Date.now();renderPage();saveData();return}}insertBlockAt(cmdInsertIndex,type)}})}

/* Format Toolbar */
function showFormatToolbar(){const tb=$('#fmtToolbar');tb.innerHTML=`<button class="fmt-btn" data-cmd="bold"><b>B</b></button><button class="fmt-btn" data-cmd="italic"><i>I</i></button><button class="fmt-btn" data-cmd="underline"><u>U</u></button><button class="fmt-btn" data-cmd="strikeThrough"><s>S</s></button><button class="fmt-btn" data-cmd="highlight">🖍️</button>${TEXT_COLORS.map(c=>`<button class="fmt-btn" data-cmd="color" data-color="${c}"><span class="fmt-color-dot" style="background:${c}"></span></button>`).join('')}<button class="fmt-btn" data-cmd="removeFormat">✕</button>`;tb.classList.add('show');if(window.visualViewport){const v=window.visualViewport;tb.style.bottom=(innerHeight-v.height-v.offsetTop)+'px'}else tb.style.bottom='0px';tb.querySelectorAll('.fmt-btn').forEach(btn=>{btn.onmousedown=e=>{e.preventDefault();const cmd=btn.getAttribute('data-cmd');if(cmd==='highlight')document.execCommand('hiliteColor',false,'yellow');else if(cmd==='color')document.execCommand('foreColor',false,btn.getAttribute('data-color'));else document.execCommand(cmd,false,null)}})}
document.addEventListener('selectionchange',()=>{const s=window.getSelection();if(s&&s.toString().length>0&&s.anchorNode){const p=s.anchorNode.parentElement;if(p&&p.closest('.block-content[contenteditable]')){showFormatToolbar();return}}$('#fmtToolbar').classList.remove('show')});

/* Drawing */
function openDrawingCanvas(bid){drawingBlockId=bid;$('#drawingOverlay').classList.add('open');const canvas=$('#drawCanvas');const area=canvas.parentElement;canvas.width=area.clientWidth;canvas.height=area.clientHeight;drawingCtx=canvas.getContext('2d');drawingCtx.lineCap='round';drawingCtx.lineJoin='round';const page=getCurrentPage();const block=page?.blocks.find(b=>b.id===bid);if(block?.content){const img=new Image();img.onload=()=>drawingCtx.drawImage(img,0,0,canvas.width,canvas.height);img.src=block.content}else{drawingCtx.fillStyle='#fff';drawingCtx.fillRect(0,0,canvas.width,canvas.height)}drawMode='pen';drawColor='#1a1a1a';drawSize=3;renderDrawToolbar();canvas.ontouchstart=e=>{e.preventDefault();startDraw(e.touches[0].clientX,e.touches[0].clientY,canvas)};canvas.ontouchmove=e=>{e.preventDefault();moveDraw(e.touches[0].clientX,e.touches[0].clientY,canvas)};canvas.ontouchend=()=>{isDrawing=false;drawPoints=[]};canvas.onmousedown=e=>startDraw(e.clientX,e.clientY,canvas);canvas.onmousemove=e=>{if(isDrawing)moveDraw(e.clientX,e.clientY,canvas)};canvas.onmouseup=canvas.onmouseleave=()=>{isDrawing=false;drawPoints=[]}}
function renderDrawToolbar(){$('#drawingToolbar').innerHTML=`<button class="draw-tool-btn${drawMode==='pen'?' active':''}" data-mode="pen">✏️</button><button class="draw-tool-btn${drawMode==='eraser'?' active':''}" data-mode="eraser">🧹</button><span style="width:1px;height:20px;background:var(--border);margin:0 3px"></span>${DRAW_COLORS.map(c=>`<div class="draw-color${drawColor===c?' active':''}" style="background:${c}" data-color="${c}"></div>`).join('')}<span style="width:1px;height:20px;background:var(--border);margin:0 3px"></span>${[2,5,10].map(s=>`<button class="draw-size-btn${drawSize===s?' active':''}" data-size="${s}"><span style="width:${s+4}px;height:${s+4}px;border-radius:50%;background:var(--text-primary);display:block"></span></button>`).join('')}`;$('#drawingToolbar').querySelectorAll('.draw-tool-btn').forEach(el=>{el.onclick=()=>{drawMode=el.getAttribute('data-mode');renderDrawToolbar()}});$('#drawingToolbar').querySelectorAll('.draw-color').forEach(el=>{el.onclick=()=>{drawColor=el.getAttribute('data-color');drawMode='pen';renderDrawToolbar()}});$('#drawingToolbar').querySelectorAll('.draw-size-btn').forEach(el=>{el.onclick=()=>{drawSize=parseInt(el.getAttribute('data-size'));renderDrawToolbar()}});$('#drawingBottomBar').innerHTML=`<button class="draw-action-btn danger" id="drawClear">${t('clear')}</button><button class="draw-action-btn sec" id="drawCancel">${t('cancel')}</button><button class="draw-action-btn primary" id="drawDone">${t('done')}</button>`;$('#drawClear').onclick=()=>{drawingCtx.fillStyle='#fff';drawingCtx.fillRect(0,0,$('#drawCanvas').width,$('#drawCanvas').height)};$('#drawCancel').onclick=()=>$('#drawingOverlay').classList.remove('open');$('#drawDone').onclick=()=>{const d=$('#drawCanvas').toDataURL('image/png');const p=getCurrentPage();const b=p?.blocks.find(bl=>bl.id===drawingBlockId);if(b){b.content=d;p.updatedAt=Date.now();renderPage();saveData()}$('#drawingOverlay').classList.remove('open')}}
function startDraw(cx,cy,canvas){isDrawing=true;const r=canvas.getBoundingClientRect();drawPoints=[{x:cx-r.left,y:cy-r.top}];drawingCtx.beginPath();drawingCtx.strokeStyle=drawMode==='eraser'?'#fff':drawColor;drawingCtx.lineWidth=drawMode==='eraser'?drawSize*4:drawSize;drawingCtx.moveTo(cx-r.left,cy-r.top)}
function moveDraw(cx,cy,canvas){if(!isDrawing)return;const r=canvas.getBoundingClientRect();const x=cx-r.left,y=cy-r.top;drawPoints.push({x,y});if(drawPoints.length>2){const l=drawPoints.length-1;const cp=drawPoints[l-1];const end={x:(cp.x+x)/2,y:(cp.y+y)/2};drawingCtx.quadraticCurveTo(cp.x,cp.y,end.x,end.y);drawingCtx.stroke();drawingCtx.beginPath();drawingCtx.moveTo(end.x,end.y)}else{drawingCtx.lineTo(x,y);drawingCtx.stroke()}}

/* Block Context Menu */
function openBlockCtx(touch,idx){const page=getCurrentPage();if(!page)return;const menu=$('#ctxMenu');menu.innerHTML=`<div class="ctx-item" data-action="delete">🗑️ ${t('delete')}</div><div class="ctx-item" data-action="duplicate">📋 ${t('duplicate')}</div><div class="ctx-item" data-action="moveUp">⬆️ ${t('moveUp')}</div><div class="ctx-item" data-action="moveDown">⬇️ ${t('moveDown')}</div><div class="ctx-item" data-action="turnInto">🔄 ${t('turnInto')}</div>`;menu.style.left=Math.min(touch.clientX,innerWidth-170)+'px';menu.style.top=Math.min(touch.clientY,innerHeight-230)+'px';menu.classList.add('open');menu.querySelectorAll('.ctx-item').forEach(el=>{el.onclick=()=>{menu.classList.remove('open');const a=el.getAttribute('data-action');const b=page.blocks[idx];if(!b)return;if(a==='delete')deleteBlockAt(idx);if(a==='duplicate'){page.blocks.splice(idx+1,0,{...b,id:uid(),metadata:{...b.metadata}});page.updatedAt=Date.now();renderPage();saveData()}if(a==='moveUp'&&idx>0){[page.blocks[idx-1],page.blocks[idx]]=[page.blocks[idx],page.blocks[idx-1]];page.updatedAt=Date.now();renderPage();saveData()}if(a==='moveDown'&&idx<page.blocks.length-1){[page.blocks[idx],page.blocks[idx+1]]=[page.blocks[idx+1],page.blocks[idx]];page.updatedAt=Date.now();renderPage();saveData()}if(a==='turnInto')openCommandMenu(idx)}});autoCloseMenu(menu)}

let emojiCb=null;
function openEmojiPicker(cb,allowImage){emojiCb=cb;const pk=$('#emojiPicker');const es=$('#emojiSearch');es.value='';renderEmojiGrid('');pk.classList.add('open');$('#emojiUploadBtn').style.display=allowImage?'block':'none';$('#emojiUploadBtn').onclick=()=>{const i=document.createElement('input');i.type='file';i.accept='image/png,image/jpeg';i.onchange=()=>{const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const page=getCurrentPage();if(page){page.iconImage=r.result;page.icon='';renderPage();renderSidebar();saveData()}pk.classList.remove('open')};r.readAsDataURL(f)};i.click()};es.oninput=()=>renderEmojiGrid(es.value);setTimeout(()=>{const cl=ev=>{if(!pk.contains(ev.target)){pk.classList.remove('open');document.removeEventListener('click',cl)}};document.addEventListener('click',cl)},100)}
function renderEmojiGrid(filter){const f=filter.toLowerCase();const filtered=f?EMOJIS.filter(e=>e.includes(f)):EMOJIS;$('#emojiGrid').innerHTML=filtered.map(em=>`<div class="emoji-cell" data-emoji="${em}">${em}</div>`).join('');$('#emojiGrid').querySelectorAll('.emoji-cell').forEach(el=>{el.onclick=()=>{if(emojiCb)emojiCb(el.getAttribute('data-emoji'));$('#emojiPicker').classList.remove('open')}})}

function openCoverPicker(){const page=getCurrentPage();if(!page)return;const pk=$('#coverPicker');$('#coverOptions').innerHTML=COVERS.map((g,i)=>`<div class="cover-opt${page.coverColor===g?' active':''}" style="background:${g}" data-idx="${i}"></div>`).join('');$('#coverOptions').querySelectorAll('.cover-opt').forEach(el=>{el.onclick=()=>{page.coverColor=COVERS[parseInt(el.getAttribute('data-idx'))];page.updatedAt=Date.now();renderPage();saveData();pk.classList.remove('open')}});pk.classList.add('open');autoCloseMenu(pk,'pageCover')}

function closeSearchView(){$('#searchView').classList.remove('open')}
function performSearch(q){q=q.toLowerCase().trim();const res=$('#searchResults');if(!q){res.innerHTML='';return}let h='';state.pages.forEach(p=>{const tm=(p.title||'').toLowerCase().includes(q);let sn='';p.blocks.forEach(b=>{if(!sn){const d=document.createElement('div');d.innerHTML=b.content;const tx=d.textContent;if(tx.toLowerCase().includes(q)){const i=tx.toLowerCase().indexOf(q);sn=(i>30?'...':'')+tx.substring(Math.max(0,i-30),i+q.length+30)+(i+q.length+30<tx.length?'...':'')}}});if(tm||sn)h+=`<div class="search-result-item" data-page-id="${p.id}"><span class="search-result-icon">${p.icon||'📝'}</span><div><div class="search-result-title">${p.title||t('untitled')}</div>${sn?`<div class="search-result-snippet">${esc(sn)}</div>`:''}</div></div>`});if(!h)h=`<div class="search-empty">${t('noResults')}</div>`;res.innerHTML=h;res.querySelectorAll('.search-result-item').forEach(el=>{el.onclick=()=>{closeSearchView();openPage(el.getAttribute('data-page-id'))}})}

/* AI View */
function openAIView(){activeView='ai';setBottomTab('ai');$('#aiView').classList.add('open');renderAIChat()}
function closeAIView(){$('#aiView').classList.remove('open')}
function renderAIChat(){const ch=$('#aiChat');const chats=state.settings.aiChats||[];let msgsHTML='';chats.forEach(m=>{if(m.role==='user')msgsHTML+=`<div class="ai-msg user">${esc(m.content)}</div>`;else msgsHTML+=`<div class="ai-msg ai"><div class="ai-label">🤖 DemNotes AI</div>${m.content}</div>`});
ch.innerHTML=`<div class="ai-key-bar"><input id="aiKeyInput" type="password" placeholder="${t('aiApiKey')} (OpenRouter)" value="${state.settings.aiApiKey||''}"></div><div class="ai-model-bar">${t('aiModel')}: <input id="aiModelInput" value="${state.settings.aiModel||'google/gemini-2.0-flash-001'}" placeholder="provider/model"></div><div class="ai-tools"><button class="ai-tool-btn" id="aiSummarize">📋 ${t('aiSummarize')}</button><button class="ai-tool-btn" id="aiGenTitle">📝 ${t('aiTitle')}</button><button class="ai-tool-btn" id="aiCreateNote">🆕 ${t('aiCreateNote')}</button></div><div class="ai-messages" id="aiMessages">${msgsHTML||`<div class="search-empty">DemNotes AI — ${t('aiChat')}</div>`}</div><div class="ai-input-bar"><textarea class="ai-input" id="aiInput" rows="1" placeholder="${t('aiPlaceholder')}"></textarea><button class="ai-send" id="aiSendBtn">▶</button></div>`;
$('#aiKeyInput').onchange=()=>{state.settings.aiApiKey=$('#aiKeyInput').value;saveData()};
$('#aiModelInput').onchange=()=>{state.settings.aiModel=$('#aiModelInput').value;saveData()};
$('#aiSendBtn').onclick=()=>sendAIMessage();
$('#aiInput').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAIMessage()}};
$('#aiSummarize').onclick=()=>aiPageAction('summarize');
$('#aiGenTitle').onclick=()=>aiPageAction('title');
$('#aiCreateNote').onclick=()=>{const topic=prompt(t('aiCreateNote'));if(topic)aiPageAction('create',topic)};
setTimeout(()=>{const mc=$('#aiMessages');if(mc)mc.scrollTop=mc.scrollHeight},100)}

async function sendAIMessage(content){const input=$('#aiInput');const msg=content||input.value.trim();if(!msg)return;if(!content)input.value='';
state.settings.aiChats=state.settings.aiChats||[];state.settings.aiChats.push({role:'user',content:msg});renderAIChat();
const mc=$('#aiMessages');const loadDiv=document.createElement('div');loadDiv.className='ai-msg ai';loadDiv.innerHTML=`<div class="ai-label">🤖 DemNotes AI</div>${t('aiThinking')}`;mc.appendChild(loadDiv);mc.scrollTop=mc.scrollHeight;
try{const resp=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${state.settings.aiApiKey}`,'HTTP-Referer':'https://demnotes.app'},body:JSON.stringify({model:state.settings.aiModel||'google/gemini-2.0-flash-001',messages:state.settings.aiChats.map(m=>({role:m.role,content:m.content})),max_tokens:2000})});const data=await resp.json();const reply=data.choices?.[0]?.message?.content||data.error?.message||'Error';state.settings.aiChats.push({role:'assistant',content:reply});saveData();renderAIChat()}catch(e){state.settings.aiChats.push({role:'assistant',content:'Error: '+e.message});renderAIChat()}}

async function aiPageAction(action,topic){const page=getCurrentPage();let prompt='';if(action==='summarize'){if(!page)return;let text='';page.blocks.forEach(b=>{const d=document.createElement('div');d.innerHTML=b.content;text+=d.textContent+'\n'});prompt=`Summarize this note in ${state.settings.language==='tr'?'Turkish':state.settings.language==='de'?'German':state.settings.language==='ru'?'Russian':'English'}:\n\n${text}`}else if(action==='title'){if(!page)return;let text='';page.blocks.forEach(b=>{const d=document.createElement('div');d.innerHTML=b.content;text+=d.textContent+'\n'});prompt=`Generate a short title for this note in ${state.settings.language==='tr'?'Turkish':state.settings.language==='de'?'German':state.settings.language==='ru'?'Russian':'English'}. Return ONLY the title:\n\n${text}`}else if(action==='create'){prompt=`Create a detailed note about "${topic}" in ${state.settings.language==='tr'?'Turkish':state.settings.language==='de'?'German':state.settings.language==='ru'?'Russian':'English'}. Format with headings and bullet points.`}
await sendAIMessage(prompt);
if(action==='title'){const last=state.settings.aiChats[state.settings.aiChats.length-1];if(last&&last.role==='assistant'&&page){page.title=last.content.replace(/["\n]/g,'').trim().substring(0,80);page.updatedAt=Date.now();renderPage();renderSidebar();saveData()}}
if(action==='create'){const last=state.settings.aiChats[state.settings.aiChats.length-1];if(last&&last.role==='assistant'){const np=createPage();np.title=topic;np.blocks=[{id:uid(),type:'paragraph',content:last.content.replace(/\n/g,'<br>'),metadata:{}}];openPage(np.id)}}}

$('#sClear').onclick=()=>showDialog(t('clearData'),t('clearConfirm'),[{text:t('confirm'),cls:'danger',action:()=>{state.pages=[];state.folders=[];state.currentPageId=null;state.settings.aiChats=[];localStorage.removeItem('demnotes_data');const p=createPage(true);openPage(p.id);renderSidebar();saveData();closeDialog();closeSettingsView()}},{text:t('cancel'),cls:'sec',action:closeDialog}])}

/* Dialogs */
function showDialog(title,msg,buttons){$('#dialogTitle').textContent=title;$('#dialogMsg').textContent=msg;const ac=$('#dialogActions');ac.innerHTML='';buttons.forEach(b=>{const btn=document.createElement('button');btn.className=`dialog-btn ${b.cls}`;btn.textContent=b.text;btn.onclick=b.action;ac.appendChild(btn)});$('#dialogOverlay').classList.add('open')}
function closeDialog(){$('#dialogOverlay').classList.remove('open')}
function showInputDialog(title,def,cb){$('#dialogTitle').textContent=title;$('#dialogMsg').innerHTML=`<input class="dialog-input" id="dialogInput" type="text" value="${esc(def||'')}">`;const ac=$('#dialogActions');ac.innerHTML='';const ok=document.createElement('button');ok.className='dialog-btn primary';ok.textContent=t('confirm');ok.onclick=()=>{cb($('#dialogInput').value);closeDialog()};const cn=document.createElement('button');cn.className='dialog-btn sec';cn.textContent=t('cancel');cn.onclick=closeDialog;ac.appendChild(cn);ac.appendChild(ok);$('#dialogOverlay').classList.add('open');setTimeout(()=>{const inp=$('#dialogInput');if(inp)inp.focus()},100)}

function showFolderPicker(pid){const page=state.pages.find(p=>p.id===pid);if(!page)return;let btns=[{text:t('noFolder'),cls:'sec',action:()=>{page.folderId=null;renderSidebar();saveData();closeDialog()}}];state.folders.forEach(f=>{btns.push({text:`${f.icon||'📁'} ${f.name}`,cls:'primary',action:()=>{page.folderId=f.id;renderSidebar();saveData();closeDialog()}})});btns.push({text:t('cancel'),cls:'sec',action:closeDialog});showDialog(t('moveToFolder'),'',btns)}

function autoCloseMenu(menu,skipId){setTimeout(()=>{const cl=ev=>{if(!menu.contains(ev.target)&&(!skipId||ev.target.id!==skipId)){menu.classList.remove('open');document.removeEventListener('click',cl)}};document.addEventListener('click',cl)},50)}
function setBottomTab(tab){$$('.bottombar-item').forEach(el=>el.classList.remove('active'));const btn=$(`.bottombar-item[data-tab="${tab}"]`);if(btn)btn.classList.add('active')}
function closeAllViews(){closeSearchView();closeAIView();closeSettingsView()}

/* Events */
function initEvents(){$('#menuBtn').onclick=openSidebar;$('#themeBtn').onclick=()=>{const ts=THEMES.map(t=>t.id);const i=ts.indexOf(state.settings.theme);state.settings.theme=ts[(i+1)%ts.length];applyTheme();saveData()};$('#langBtn').onclick=cycleLang;$('#sidebarOverlay').onclick=closeSidebar;$('#sidebarNewBtn').onclick=()=>{const p=createPage();openPage(p.id)};$('#sidebarNewFolderBtn').onclick=()=>showInputDialog(t('folderName'),'',name=>{if(name.trim()){state.folders.push({id:uid(),name:name.trim(),icon:'📁',_open:true});renderSidebar();saveData()}});$('#sidebarSettingsBtn').onclick=()=>{closeSidebar();openSettingsView()};
$('#sidebarPages').addEventListener('click',e=>{const del=e.target.closest('.sidebar-page-del');if(del){e.stopPropagation();showDialog(t('deleteNote'),t('deleteNoteConfirm'),[{text:t('confirm'),cls:'danger',action:()=>{closeDialog();deletePage(del.getAttribute('data-del-id'))}},{text:t('cancel'),cls:'sec',action:closeDialog}]);return}const star=e.target.closest('.sidebar-page-star');if(star){e.stopPropagation();const p=state.pages.find(pg=>pg.id===star.getAttribute('data-star-id'));if(p){p.isFavorite=!p.isFavorite;renderSidebar();saveData()}return}const item=e.target.closest('.sidebar-page-item');if(item)openPage(item.getAttribute('data-page-id'))});
$('#sidebarPages').addEventListener('touchstart',e=>{const item=e.target.closest('.sidebar-page-item');if(!item)return;longPressTimer=setTimeout(()=>{const pid=item.getAttribute('data-page-id');const page=state.pages.find(p=>p.id===pid);if(!page)return;const menu=$('#pageCtxMenu');let fm=state.folders.length?`<div class="ctx-item" data-action="movefolder">📂 ${t('moveToFolder')}</div>`:`<div class="ctx-item" data-action="newfolder">📁+ ${t('newFolder')}</div>`;menu.innerHTML=`<div class="ctx-item" data-action="fav">${page.isFavorite?'☆':'⭐'} ${page.isFavorite?t('unfavorite'):t('favorite')}</div>${fm}<div class="ctx-item danger" data-action="del">🗑️ ${t('delete')}</div>`;const touch=e.touches[0];menu.style.left=Math.min(touch.clientX,innerWidth-170)+'px';menu.style.top=Math.min(touch.clientY,innerHeight-120)+'px';menu.classList.add('open');menu.querySelectorAll('.ctx-item').forEach(el=>{el.onclick=()=>{menu.classList.remove('open');const a=el.getAttribute('data-action');if(a==='fav'){page.isFavorite=!page.isFavorite;renderSidebar();saveData()}if(a==='del')deletePage(pid);if(a==='movefolder')showFolderPicker(pid);if(a==='newfolder')showInputDialog(t('folderName'),'',name=>{if(name.trim()){const nf={id:uid(),name:name.trim(),icon:'📁',_open:true};state.folders.push(nf);page.folderId=nf.id;renderSidebar();saveData()}})}});autoCloseMenu(menu)},500)},{passive:false});
$('#sidebarPages').addEventListener('touchend',()=>clearTimeout(longPressTimer));$('#sidebarPages').addEventListener('touchmove',()=>clearTimeout(longPressTimer));
$('#tabHome').onclick=()=>{closeAllViews();activeView='home';setBottomTab('home');if(state.currentPageId)renderPage()};$('#tabSearch').onclick=()=>{closeAllViews();openSearchView()};$('#tabNew').onclick=()=>{closeAllViews();const p=createPage();openPage(p.id)};$('#tabAI').onclick=()=>{closeAllViews();openAIView()};$('#tabSettings').onclick=()=>{closeAllViews();openSettingsView()};
$('#searchInput').oninput=e=>performSearch(e.target.value);$('#searchCancel').onclick=()=>{closeSearchView();activeView='home';setBottomTab('home')};$('#aiBack').onclick=()=>{closeAIView();activeView='home';setBottomTab('home')};$('#settingsBack').onclick=()=>{closeSettingsView();activeView='home';setBottomTab('home')};$('#cmdOverlay').onclick=closeCommandMenu;$('#cmdSearch').oninput=e=>renderCmdList(e.target.value);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCommandMenu();closeAllViews();closeDialog();closeSidebar();$('#emojiPicker').classList.remove('open');$('#coverPicker').classList.remove('open');$('#ctxMenu').classList.remove('open');$('#pageCtxMenu').classList.remove('open')}});
document.body.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY},{passive:true});document.body.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-touchStartX;const dy=e.changedTouches[0].clientY-touchStartY;if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){if(dx>0&&touchStartX<40)openSidebar();if(dx<0&&$('#sidebar').classList.contains('open'))closeSidebar()}},{passive:true});
if(window.visualViewport){window.visualViewport.addEventListener('resize',()=>{const tb=$('#fmtToolbar');if(tb.classList.contains('show')){const v=window.visualViewport;tb.style.bottom=(innerHeight-v.height-v.offsetTop)+'px'}})}}

/* Onboarding */
function initOnboarding(){if(state.settings.onboarded){$('#onboarding').classList.add('hidden');$('#app').style.display='';return}
const sysTheme=detectSystemTheme();document.documentElement.setAttribute('data-theme',sysTheme);
$$('.ob-btn[data-lang]').forEach(el=>{el.onclick=()=>{state.settings.language=el.getAttribute('data-lang');applyLanguage();$('#obStep1').classList.remove('active');$('#obStep2').classList.add('active');$('#obSub').textContent=t('selectTheme');renderObThemes()}});
function renderObThemes(){$('#obThemeGrid').innerHTML=THEMES.map(tm=>`<button class="ob-theme-btn" data-theme="${tm.id}"><div class="ob-theme-dot" style="background:${tm.dot}"></div>${t('theme'+tm.id.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join(''))}</button>`).join('');$('#obThemeGrid').querySelectorAll('.ob-theme-btn').forEach(el=>{el.onclick=()=>{state.settings.theme=el.getAttribute('data-theme');state.settings.onboarded=true;applyTheme();applyLanguage();$('#onboarding').classList.add('hidden');$('#app').style.display='';const p=createPage(true);state.currentPageId=p.id;state.settings.lastOpenedPageId=p.id;renderSidebar();renderPage();saveData()}})}}

function init(){loadData();applyTheme();applyLanguage();if(state.settings.onboarded){$('#onboarding').classList.add('hidden');$('#app').style.display='';if(!state.pages.length){const p=createPage(true);state.currentPageId=p.id;state.settings.lastOpenedPageId=p.id;saveData()}else state.currentPageId=state.settings.lastOpenedPageId||state.pages[0]?.id;renderSidebar();if(state.currentPageId)renderPage()}initOnboarding();initEvents()}
init();
</script>
</body>
</html>
